                                color: 0xff4400,
                                gfx: null
                            });
                        }
                    }
                    if (frame >= b.activeFrames - 10 && b._divePhase !== 'up') {
                        b._divePhase = 'up';
                    }
                    if (b._divePhase === 'up') {
                        s.y -= 6;
                        if (s.y < b.savedY) s.y = b.savedY;
                    }
                }
                break;

            case 'ruin_knight':
                if (name === 'spiral' && frame % 3 === 0) {
                    b._spiralAngle = (b._spiralAngle || 0) + 0.35;
                    let speed = b.enraged ? 300 : 240;
                    this.spawnBossProjectile(s.x, s.y - BOSS_SIZE/2,
                        Math.cos(b._spiralAngle) * speed, Math.sin(b._spiralAngle) * speed,
                        'orb', 0xdd66ff);
                    this.spawnBossProjectile(s.x, s.y - BOSS_SIZE/2,
                        Math.cos(b._spiralAngle + Math.PI * 0.5) * speed * 0.8,
                        Math.sin(b._spiralAngle + Math.PI * 0.5) * speed * 0.8,
                        'orb', 0xaa44ff);
                }
                if (name === 'shield_charge') {
                    s.x += b._chargeDir * 7;
                }
                if (name === 'teleport_strike') {
                    if (frame === 1) {
                        s.x = b._teleTarget;
                        s.setAlpha(1);
                    }
                    if (frame === 10) {
                        // Slash at current position
                        let dir = this.player.x < s.x ? -1 : 1;
                        this.spawnBossProjectile(s.x, s.y - BOSS_SIZE/2, dir * 500, 0, 'shockwave', 0xeedd44);
                    }
                }
                break;
        }
    }

    // --------------------------------------------------------
    // Boss projectiles
    // --------------------------------------------------------
    spawnBossProjectile(x, y, vx, vy, type, color, opts) {
        // Cap projectiles to prevent performance degradation in long fights
        if (this.bossProjectiles.length >= 40) {
            let oldest = this.bossProjectiles.shift();
            oldest.gfx.destroy();
        }
        opts = opts || {};
        let g = this.add.graphics();
        g.setDepth(11);

        let size;
        switch (type) {
            case 'carrot': size = 12; break;
            case 'homing': size = 10; break;
            case 'shockwave': size = 20; break;
            case 'rock': size = 14; break;
            case 'tornado': size = 24; break;
            case 'feather': size = 8; break;
            case 'acid': size = 10; break;
            case 'fireball': size = 12; break;
            case 'orb': size = 10; break;
            default: size = 10;
        }

        // Draw shape
        g.fillStyle(color, 1);
        if (type === 'shockwave') {
            g.fillRect(-size/2, -size/4, size, size/2);
        } else if (type === 'tornado') {
            g.fillEllipse(0, 0, size, size * 1.5);
        } else {
            g.fillCircle(0, 0, size/2);
        }
        // Glow
        g.fillStyle(color, 0.3);
        g.fillCircle(0, 0, size * 0.8);

        g.setPosition(x, y);

        let proj = {
            gfx: g,
            x: x, y: y,
            vx: vx, vy: vy,
            type: type,
            size: size,
            life: opts.life || 300,
            turnRate: opts.turnRate || 0,
            gravity: opts.gravity || false,
            amplitude: opts.amplitude || 0,
            sinePhase: opts.sinePhase || 0,
            baseY: y
        };

        this.bossProjectiles.push(proj);
        return proj;
    }

    updateBossProjectiles(delta) {
        let dt = delta / 1000;
        for (let i = this.bossProjectiles.length - 1; i >= 0; i--) {
            let p = this.bossProjectiles[i];
            p.life--;

            if (p.gravity) {
                p.vy += 600 * dt;
            }

            if (p.turnRate > 0 && this.player.active) {
                // Homing
                let angle = Math.atan2(this.player.y - SPRITE_SIZE/2 - p.y, this.player.x - p.x);
                let currentAngle = Math.atan2(p.vy, p.vx);
                let diff = angle - currentAngle;
                while (diff > Math.PI) diff -= Math.PI * 2;
                while (diff < -Math.PI) diff += Math.PI * 2;
                currentAngle += diff * p.turnRate * 60 * dt;
                let speed = Math.sqrt(p.vx * p.vx + p.vy * p.vy);
                p.vx = Math.cos(currentAngle) * speed;
                p.vy = Math.sin(currentAngle) * speed;
            }

            if (p.amplitude > 0) {
                p.sinePhase += 0.05;
                p.y = p.baseY + Math.sin(p.sinePhase) * p.amplitude;
            }

            p.x += p.vx * dt;
            p.y += p.vy * dt;
            if (p.amplitude > 0) {
                p.baseY += p.vy * dt;
            }
            p.gfx.setPosition(p.x, p.y);

            // Check collision with player
            if (this.player.active && this.invincibleTimer <= 0) {
                let dx = Math.abs(p.x - this.player.x);
                let dy = Math.abs(p.y - (this.player.y - SPRITE_SIZE/2));
                if (dx < (p.size + SPRITE_SIZE * 0.3) && dy < (p.size + SPRITE_SIZE * 0.3)) {
                    this.takeDamage();
                    p.life = 0;
                }
            }

            // Cleanup
            if (p.life <= 0 || p.y > H + 50 || p.y < -100 || p.x < -200 || p.x > this.levelWidth + 200) {
                p.gfx.destroy();
                this.bossProjectiles.splice(i, 1);
            }
        }
    }

    clearBossProjectiles() {
        for (let p of this.bossProjectiles) {
            p.gfx.destroy();
        }
        this.bossProjectiles = [];
    }

    spawnLightningBolt(x) {
        let bolt = this.add.graphics();
        bolt.setDepth(12);
        bolt.lineStyle(4, 0xe0ff20, 1);
        let cy = 0;
        bolt.beginPath();
        bolt.moveTo(x, 0);
        while (cy < GROUND_Y + SPRITE_SIZE) {
            cy += 10 + Math.random() * 20;
            let nx = x + (Math.random() - 0.5) * 30;
            bolt.lineTo(nx, cy);
        }
        bolt.strokePath();

        // Glow
        bolt.lineStyle(8, 0xe0ff20, 0.3);
        cy = 0;
        bolt.beginPath();
        bolt.moveTo(x, 0);
        while (cy < GROUND_Y + SPRITE_SIZE) {
            cy += 10 + Math.random() * 20;
            bolt.lineTo(x + (Math.random() - 0.5) * 30, cy);
        }
        bolt.strokePath();

        // Damage check
        if (Math.abs(this.player.x - x) < 40) {
            this.takeDamage();
        }

        this.time.delayedCall(200, () => bolt.destroy());
    }

    // --------------------------------------------------------
    // Damage zones
    // --------------------------------------------------------
    updateDamageZones(delta) {
        for (let i = this.damageZones.length - 1; i >= 0; i--) {
            let dz = this.damageZones[i];
            dz.life--;

            if (!dz.gfx) {
                dz.gfx = this.add.graphics();
                dz.gfx.setDepth(6);
            }

            dz.gfx.clear();
            let alpha = 0.3 + Math.sin(this.frameCount * 0.1) * 0.2;
            dz.gfx.fillStyle(dz.color, alpha);
            dz.gfx.fillRect(dz.x, dz.y, dz.w, dz.h);

            // Player collision
            if (this.player.active && this.invincibleTimer <= 0) {
                let px = this.player.x;
                let py = this.player.y;
                if (px > dz.x && px < dz.x + dz.w && py > dz.y && py < dz.y + dz.h + SPRITE_SIZE) {
                    this.takeDamage();
                }
            }

            if (dz.life <= 0) {
                dz.gfx.destroy();
                this.damageZones.splice(i, 1);
            }
        }
    }

    clearDamageZones() {
        for (let dz of this.damageZones) {
            if (dz.gfx) dz.gfx.destroy();
        }
        this.damageZones = [];
    }

    // --------------------------------------------------------
    // Stars / Clouds
    // --------------------------------------------------------
    updateStars() {
        let g = this.starGraphics;
        g.clear();
        for (let star of this.stars) {
            let alpha = 0.3 + Math.sin(this.frameCount * 0.03 + star.phase) * 0.5;
            g.fillStyle(0xffffff, Math.max(0, alpha));
            g.fillRect(star.x, star.y, star.size, star.size);
        }
    }

    updateClouds(delta) {
        for (let c of this.clouds) {
            c.gfx.x += c.speed;
            if (c.gfx.x > this.levelWidth + 100) {
                c.gfx.x = -100;
            }
        }
    }

    // --------------------------------------------------------
    // Goal check
    // --------------------------------------------------------
    checkGoal() {
        if (this.player.x >= this.GOAL_X && this.bossDead) {
            if (this.currentLevel < 5) {
                this.levelComplete = true;
                this.score += 100;
                this.saveHiScore();
                this.showLevelCompleteOverlay();
            } else {
                this.victory = true;
                this.score += 200;
                this.saveHiScore();
                this.showVictoryOverlay();
            }
        }
    }

    showLevelCompleteOverlay() {
        let overlay = this.add.graphics();
        overlay.fillStyle(0x000000, 0.85);
        overlay.fillRect(0, 0, W, H);
        overlay.setScrollFactor(0).setDepth(200);

        // Decorative border
        overlay.lineStyle(4, 0x44ff44, 0.8);
        overlay.strokeRect(40, H/2 - 80, W - 80, 160);
        overlay.setScrollFactor(0).setDepth(200);

        this.add.text(W/2, H/2 - 40, 'LEVEL ' + (this.currentLevel + 1) + ' COMPLETE!', {
            fontFamily: FONT, fontSize: '22px', color: '#44ff44',
            stroke: '#003300', strokeThickness: 6
        }).setOrigin(0.5).setScrollFactor(0).setDepth(201);

        this.add.text(W/2, H/2 + 10, 'SCORE: ' + this.score, {
            fontFamily: FONT, fontSize: '14px', color: '#ffd866',
            stroke: '#443300', strokeThickness: 4
        }).setOrigin(0.5).setScrollFactor(0).setDepth(201);

        let cont = this.add.text(W/2, H/2 + 55, 'PRESS SPACE TO CONTINUE', {
            fontFamily: FONT, fontSize: '11px', color: '#ffffff',
            stroke: '#000000', strokeThickness: 4
        }).setOrigin(0.5).setScrollFactor(0).setDepth(201);

        this.tweens.add({ targets: cont, alpha: 0, duration: 500, yoyo: true, repeat: -1 });
    }

    showVictoryOverlay() {
        let overlay = this.add.graphics();
        overlay.fillStyle(0x000000, 0.7);
        overlay.fillRect(0, 0, W, H);
        overlay.setScrollFactor(0).setDepth(200);

        this.add.text(W/2, H/2 - 50, 'VICTORY!', {
            fontFamily: FONT, fontSize: '32px', color: '#ffd866'
        }).setOrigin(0.5).setScrollFactor(0).setDepth(201);

        this.add.text(W/2, H/2, 'ALL BOSSES DEFEATED!', {
            fontFamily: FONT, fontSize: '14px', color: '#44ff44'
        }).setOrigin(0.5).setScrollFactor(0).setDepth(201);

        this.add.text(W/2, H/2 + 40, 'FINAL SCORE: ' + this.score, {
            fontFamily: FONT, fontSize: '14px', color: '#ffd866'
        }).setOrigin(0.5).setScrollFactor(0).setDepth(201);

        this.add.text(W/2, H/2 + 80, 'PRESS SPACE FOR MENU', {
            fontFamily: FONT, fontSize: '11px', color: '#ffffff',
            stroke: '#000000', strokeThickness: 4
        }).setOrigin(0.5).setScrollFactor(0).setDepth(201);

        // Celebration
        for (let i = 0; i < 8; i++) {
            this.time.delayedCall(i * 200, () => {
                this.spawnCelebrationParticles(
                    W * 0.2 + Math.random() * W * 0.6,
                    H * 0.2 + Math.random() * H * 0.3
                );
            });
        }
    }

    saveHiScore() {
        if (this.score > this.hiScore) {
            this.hiScore = this.score;
            localStorage.setItem('sixseven_hi', this.hiScore);
        }
    }

    // --------------------------------------------------------
    // Particles
    // --------------------------------------------------------
    spawnPoofParticles(x, y) {
        let colors = [0xffff00, 0xffffff, 0xff8800];
        for (let i = 0; i < 14; i++) {
            let p = this.add.graphics();
            let c = colors[i % colors.length];
            p.fillStyle(c, 1);
            p.fillCircle(0, 0, 2 + Math.random() * 3);
            p.setPosition(x, y);
            p.setDepth(15);

            let vx = (Math.random() - 0.5) * 200;
            let vy = (Math.random() - 0.5) * 200 - 100;
            let life = 300 + Math.random() * 200;

            this.tweens.add({
                targets: p,
                x: x + vx * 0.5,
                y: y + vy * 0.5,
                alpha: 0,
                duration: life,
                onComplete: () => p.destroy()
            });
        }
    }

    spawnLandingDust(x, y) {
        for (let i = 0; i < 4; i++) {
            let p = this.add.graphics();
            p.fillStyle(0x886644, 0.6);
            p.fillCircle(0, 0, 2 + Math.random() * 2);
            p.setPosition(x + (Math.random() - 0.5) * 20, y);
            p.setDepth(15);

            this.tweens.add({
                targets: p,
                y: y - 10 - Math.random() * 10,
                alpha: 0,
                duration: 300,
                onComplete: () => p.destroy()
            });
        }
    }

    spawnScorePopup(x, y, text) {
        // Convert world coords to screen coords for scroll factor 0
        let screenX = x - this.cameras.main.scrollX;
        let screenY = y - this.cameras.main.scrollY;
        let t = this.add.text(screenX, screenY, text, {
            fontFamily: FONT, fontSize: '10px', color: '#ffd866'
        }).setOrigin(0.5).setScrollFactor(0).setDepth(20);

        this.tweens.add({
            targets: t,
            y: screenY - 40,
            alpha: 0,
            duration: 800,
            onComplete: () => t.destroy()
        });
    }

    spawnDeathParticles(x, y) {
        let colors = [0xff0000, 0xff4400, 0xff8800, 0xffaa00];
        for (let i = 0; i < 24; i++) {
            let p = this.add.graphics();
            let c = colors[i % colors.length];
            p.fillStyle(c, 1);
            p.fillCircle(0, 0, 2 + Math.random() * 4);
            p.setPosition(x, y);
            p.setDepth(15);

            let angle = (Math.PI * 2 / 24) * i;
            let dist = 50 + Math.random() * 50;

            this.tweens.add({
                targets: p,
                x: x + Math.cos(angle) * dist,
                y: y + Math.sin(angle) * dist,
                alpha: 0,
                duration: 600 + Math.random() * 300,
                onComplete: () => p.destroy()
            });
        }
    }

    // --------------------------------------------------------
    // Breakable blocks
    // --------------------------------------------------------
    generateBreakableBlocks(levelIndex) {
        let rng = seededRandom(levelIndex * 333 + 99);
        let blockSize = 32;
        let count = 7 + Math.floor(rng() * 5); // 7-11 blocks per level

        for (let i = 0; i < count; i++) {
            let bx, by;
            // Mix: some above platforms, some in open air
            if (i < this.platformData.length && rng() > 0.4) {
                let p = this.platformData[Math.floor(rng() * this.platformData.length)];
                bx = p.x + rng() * Math.max(0, p.w - blockSize);
                by = p.y - blockSize - 48 - rng() * 40;
            } else {
                bx = 300 + rng() * (this.levelWidth - 600);
                by = 160 + rng() * 140;
            }
            bx = Math.max(100, Math.min(this.levelWidth - 200, bx));

            let types = ['spread_shot', 'rapid_fire', 'big_carrot', 'shield', 'speed_boost'];
            let powerupType = types[Math.floor(rng() * types.length)];

            this.breakableBlocks.push({
                x: bx, y: by, w: blockSize, h: blockSize,
                active: true, powerupType: powerupType,
                bumping: false, bumpTimer: 0
            });
        }
    }

    drawBreakableBlocks() {
        let g = this.blockGraphics;
        g.clear();
        for (let block of this.breakableBlocks) {
            if (!block.active) continue;
            let x = block.x, y = block.y + (block.bumping ? -4 : 0);
            let w = block.w, h = block.h;
            // Shadow
            g.fillStyle(0x443300, 0.5);
            g.fillRect(x + 2, y + 2, w, h);
            // Outer border
            g.fillStyle(0x886600, 1);
            g.fillRect(x, y, w, h);
            // Inner fill (gold)
            g.fillStyle(0xddaa00, 1);
            g.fillRect(x + 2, y + 2, w - 4, h - 4);
            // Shine
            g.fillStyle(0xffee55, 1);
            g.fillRect(x + 3, y + 3, w - 8, 4);
            g.fillRect(x + 3, y + 3, 4, h - 8);
            // Draw "?" using pixel blocks
            let mx = Math.floor(x + w / 2), my = Math.floor(y + h / 2);
            g.fillStyle(0x553300, 1);
            g.fillRect(mx - 4, my - 9, 8, 2);   // top bar of ?
            g.fillRect(mx + 2, my - 7, 2, 4);   // right side
            g.fillRect(mx - 2, my - 3, 4, 2);   // middle curve
            g.fillRect(mx - 2, my + 1, 4, 2);   // gap
            g.fillRect(mx - 2, my + 4, 4, 2);   // dot
        }
    }

    updateBreakableBlocks() {
        let needsRedraw = false;

        for (let block of this.breakableBlocks) {
            if (!block.active) continue;

            // Bump animation
            if (block.bumping) {
                block.bumpTimer--;
                if (block.bumpTimer <= 0) {
                    block.bumping = false;
                    needsRedraw = true;
                }
            }

            let bRect = new Phaser.Geom.Rectangle(block.x, block.y, block.w, block.h);

            // Check carrot hits
            let carrots = this.carrots.getChildren();
            for (let i = carrots.length - 1; i >= 0; i--) {
                let c = carrots[i];
                if (!c.active) continue;
                if (bRect.contains(c.x, c.y)) {
                    c.destroy();
                    this.breakBlock(block);
                    needsRedraw = true;
                    break;
                }
            }

            if (!block.active) continue;

            // Check player jumping up into block from below
            let p = this.player;
            let pTop = p.y - SPRITE_SIZE;
            if (p.body.velocity.y < -50 &&
                p.x > block.x - 10 && p.x < block.x + block.w + 10 &&
                pTop >= block.y - 8 && pTop <= block.y + block.h * 0.5) {
                this.breakBlock(block);
                needsRedraw = true;
            }
        }

        if (needsRedraw) this.drawBreakableBlocks();
    }

    breakBlock(block) {
        if (!block.active) return;
        block.active = false;
        this.spawnPoofParticles(block.x + block.w / 2, block.y + block.h / 2);
        this.spawnBlockPowerup(block.x + block.w / 2, block.y, block.powerupType);
    }

    spawnBlockPowerup(x, y, type) {
        let colorMap = {
            spread_shot: 0xff8800, rapid_fire: 0xff2222,
            big_carrot: 0x44ff44, shield: 0x4488ff, speed_boost: 0xffff00
        };
        let pickup = this.physics.add.sprite(x, y - 16, 'sprites', 'CARROT_SPRITE');
        pickup.setScale(S * 0.9);
        pickup.setDepth(7);
        pickup.setTint(colorMap[type] || 0xffffff);
        pickup.body.allowGravity = true;
        pickup.body.setGravityY(200);
        pickup.setBounce(0.3);
        pickup._pickupType = 'powerup';
        pickup._powerupType = type;
        pickup._bobPhase = 0;
        this.pickups.add(pickup);

        this.time.delayedCall(15000, () => {
            if (pickup && pickup.active) pickup.destroy();
        });
    }

    spawnCelebrationParticles(x, y) {
        let colors = [0xff4444, 0x44ff44, 0x4444ff, 0xffff44, 0xff44ff, 0x44ffff];
        for (let i = 0; i < 20; i++) {
            let p = this.add.graphics();
            let c = colors[i % colors.length];
            p.fillStyle(c, 1);
            p.fillCircle(0, 0, 2 + Math.random() * 3);
            p.setPosition(x, y);
            p.setScrollFactor(0);
            p.setDepth(210);

            let angle = Math.random() * Math.PI * 2;
            let dist = 40 + Math.random() * 80;

            this.tweens.add({
                targets: p,
                x: x + Math.cos(angle) * dist,
                y: y + Math.sin(angle) * dist,
                alpha: 0,
                duration: 600 + Math.random() * 400,
                onComplete: () => p.destroy()
            });
        }
    }
}

        arcade: {
