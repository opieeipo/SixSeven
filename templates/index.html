// ── sprite renderer ─────────────────────────────────────────
function drawSprite(sprite, x, y, scale) {
    scale = scale || S;
    for (let row = 0; row < sprite.length; row++) {
        for (let col = 0; col < sprite[row].length; col++) {
            let c = sprite[row][col];
            if (c === null) continue;
            ctx.fillStyle = c;
            ctx.fillRect(
                Math.round(x + col * scale),
                Math.round(y + row * scale),
                scale, scale
            );
        }
    }
}

function makeEnemies() {
    const lvl = currentLevel;
    const speedBase = 1 + (lvl - 1) * 0.3; // each level 30% faster
    let list = [];
    let groundXs = [420,680,920,1160,1460,1680,1940,2190,2380,2620,
                    2870,3080,3320,3580,3840,4080,4340,4580,4870,5080,
                    5340,5580,5840,6080];

    for (let i = 0; i < groundXs.length; i++) {
        let x = groundXs[i];
        let speedMult = speedBase * (1 + (x / LEVEL_WIDTH) * 0.6);
        let type, hp, speed;

        if (lvl === 1) {
            if (x < 2100) {
                type = 'bunny'; hp = 1; speed = 0;
            } else if (x < 4200) {
                let roll = i % 3;
                if (roll === 0) { type = 'bunny'; hp = 1; speed = 0; }
                else if (roll === 1) { type = 'tortoise'; hp = 2; speed = 0.4 * speedMult; }
                else { type = 'fox'; hp = 1; speed = 1.8 * speedMult; }
            } else {
                let roll = i % 3;
                if (roll === 0) { type = 'tortoise'; hp = 2; speed = 0.5 * speedMult; }
                else if (roll === 1) { type = 'fox'; hp = 1; speed = 2.2 * speedMult; }
                else { type = 'bunny'; hp = 1; speed = 0; }
            }
        } else if (lvl === 2) {
            // Level 2: heavier enemies, no early bunnies
            if (x < 1500) {
                let roll = i % 2;
                if (roll === 0) { type = 'tortoise'; hp = 2; speed = 0.5 * speedMult; }
                else { type = 'bunny'; hp = 1; speed = 0; }
            } else if (x < 3500) {
                let roll = i % 3;
                if (roll === 0) { type = 'tortoise'; hp = 2; speed = 0.6 * speedMult; }
                else if (roll === 1) { type = 'fox'; hp = 1; speed = 2.5 * speedMult; }
                else { type = 'tortoise'; hp = 2; speed = 0.7 * speedMult; }
            } else {
                let roll = i % 3;
                if (roll === 0) { type = 'fox'; hp = 1; speed = 2.8 * speedMult; }
                else if (roll === 1) { type = 'tortoise'; hp = 2; speed = 0.8 * speedMult; }
                else { type = 'fox'; hp = 1; speed = 3.0 * speedMult; }
            }
        } else { // lvl === 3
            // Level 3: nearly all foxes, fast tortoises
            if (x < 2000) {
                let roll = i % 2;
                if (roll === 0) { type = 'fox'; hp = 1; speed = 3.0 * speedMult; }
                else { type = 'tortoise'; hp = 2; speed = 1.0 * speedMult; }
            } else {
                let roll = i % 3;
                if (roll === 0) { type = 'fox'; hp = 1; speed = 3.5 * speedMult; }
                else if (roll === 1) { type = 'fox'; hp = 1; speed = 3.2 * speedMult; }
                else { type = 'tortoise'; hp = 2; speed = 1.2 * speedMult; }
            }
        }

        list.push({
            type, x, y: GROUND_Y,
            w: SPRITE_SIZE - 8, h: SPRITE_SIZE,
            alive: true, hp, maxHp: hp,
            speed, vx: 0, flashFrames: 0,
            baseX: x, patrolDir: 1
        });
    }

    // Platform bunnies (level 1 & 2) / foxes (level 3)
    for (let pi of [1, 4, 7, 11, 14, 19]) {
        if (!PLATFORMS[pi]) continue;
        let plat = PLATFORMS[pi];
        let pType = lvl === 3 ? 'fox' : 'bunny';
        let pSpeed = lvl === 3 ? 2.5 : 0;
        list.push({
            type: pType,
            x: plat.x + plat.w / 2 - (SPRITE_SIZE - 8) / 2,
            y: plat.top - SPRITE_SIZE,
            w: SPRITE_SIZE - 8, h: SPRITE_SIZE,
            alive: true, hp: 1, maxHp: 1,
            speed: pSpeed, vx: 0, flashFrames: 0,
            baseX: plat.x + plat.w / 2 - (SPRITE_SIZE - 8) / 2, patrolDir: 1
        });
    }

    // Flying crows: appear earlier/denser in higher levels
    let crowXs = lvl === 1
        ? [3600, 4100, 4600, 5100, 5600, 6050]
        : lvl === 2
            ? [2400, 2900, 3400, 3900, 4400, 4900, 5400, 5900]
            : [1200, 1700, 2200, 2700, 3200, 3700, 4200, 4700, 5200, 5700];
    for (let x of crowXs) {
        let speedMult = speedBase * (1 + (x / LEVEL_WIDTH) * 0.6);
        list.push({
            type: 'crow',
            x, y: 150,
            w: SPRITE_SIZE - 4, h: SPRITE_SIZE - 8,
            alive: true, hp: 1, maxHp: 1,
            speed: (0.9 + (lvl - 1) * 0.4) * speedMult, vx: 0,
            flyBaseY: 120 + Math.random() * 120,
            flyPhase: Math.random() * Math.PI * 2,
            flashFrames: 0,
            baseX: x, patrolDir: -1
        });
    }

    return list;
}

    };

function updateBoss() {
    if (!boss || !boss.alive) return;
    if (boss.flashFrames > 0) boss.flashFrames--;
    const enraged = boss.hp <= Math.floor(boss.maxHp / 2);
    const BOSS_PX = 24 * S;

    if (boss.type === 'bunny_king') {
        // Gravity / jump
        boss.vy += GRAVITY;
        boss.y += boss.vy;
        if (boss.y >= GROUND_Y) { boss.y = GROUND_Y; boss.vy = 0; boss.onGround = true; }
        else { boss.onGround = false; }
        // Hop
        boss.jumpCooldown--;
        if (boss.jumpCooldown <= 0 && boss.onGround) {
            boss.vy = enraged ? -22 : -18;
            boss.onGround = false;
            boss.jumpCooldown = enraged ? 60 : 90;
        }
        // Shoot carrots toward player
        boss.shootCooldown--;
        if (boss.shootCooldown <= 0) {
            let count = enraged ? 5 : 3;
            let spread = enraged ? 18 : 12;
            for (let ci = 0; ci < count; ci++) {
                let angle = ((ci - Math.floor(count / 2)) * spread) * Math.PI / 180;
                bossProjectiles.push({
                    type: 'boss_carrot', x: boss.x, y: boss.y + 40,
                    vx: -9 * Math.cos(angle) - 1,
                    vy: -9 * Math.sin(angle),
                    w: 24, h: 16, life: 120
                });
            }
            boss.shootCooldown = enraged ? 80 : 120;
        }

    } else if (boss.type === 'golem') {
        if (boss.slamPhase === 0) {
            // Walk toward player
            let dir = player.x < boss.x ? -1 : 1;
            let spd = enraged ? 1.4 : 0.8;
            boss.x += dir * spd;
            boss.slamCooldown--;
            if (boss.slamCooldown <= 0) { boss.slamPhase = 1; boss.slamCooldown = 40; }
        } else if (boss.slamPhase === 1) {
            // Pause before slam
            boss.slamCooldown--;
            if (boss.slamCooldown <= 0) {
                // Slam: shockwave
                let shockSpd = enraged ? -14 : -10;
                bossProjectiles.push({
                    type: 'shockwave', x: boss.x, y: GROUND_Y + SPRITE_SIZE - 20,
                    vx: shockSpd, vy: 0, w: 80, h: 24, life: 80
                });
                // Enraged: also drop a rock above player
                if (enraged) {
                    bossProjectiles.push({
                        type: 'rock', x: player.x + SPRITE_SIZE / 2, y: 0,
                        vx: 0, vy: 4, w: 28, h: 28, life: 150
                    });
                }
                boss.slamPhase = 0;
                boss.slamCooldown = enraged ? 100 : 150;
            }
        }

    } else if (boss.type === 'storm_crow') {
        // Horizontal patrol with sine-wave altitude
        boss.flyX += boss.flyVx;
        const arenaL = GOAL_X - 900, arenaR = GOAL_X - 60;
        if (boss.flyX < arenaL) { boss.flyX = arenaL; boss.flyVx = Math.abs(boss.flyVx); }
        if (boss.flyX > arenaR) { boss.flyX = arenaR; boss.flyVx = -Math.abs(boss.flyVx); }
        boss.flyPhase += 0.04;
        if (boss.divePhase === 0) {
            boss.x = boss.flyX;
            boss.y = boss.diveBaseY + Math.sin(boss.flyPhase) * 60;
            // Lightning strike
            boss.lightningCooldown--;
            if (boss.lightningCooldown <= 0) {
                bossProjectiles.push({
                    type: 'lightning', x: player.x + SPRITE_SIZE / 2, y: 0,
                    vx: 0, vy: 0, w: 12, h: H, life: 40, strikeDelay: 20
                });
                boss.lightningCooldown = enraged ? 55 : 80;
            }
            // Dive bomb
            boss.diveCooldown--;
            if (boss.diveCooldown <= 0) { boss.divePhase = 1; boss.diveTargetY = GROUND_Y; }
        } else if (boss.divePhase === 1) {
            boss.y += enraged ? 14 : 10;
            if (boss.y >= boss.diveTargetY) { boss.divePhase = 2; }
        } else if (boss.divePhase === 2) {
            boss.y -= 8;
            if (boss.y <= boss.diveBaseY) { boss.divePhase = 0; boss.diveCooldown = enraged ? 65 : 100; }
        }
    }

    // Boss stays in arena bounds
    boss.x = Math.max(GOAL_X - 900, Math.min(boss.x, GOAL_X - BOSS_PX - 20));
}

function drawBossSprite(b) {
    const sx = b.x - cameraX;
    if (sx > W + 120 || sx < -120) return;
    let sprite;
    if (b.type === 'bunny_king') {
        sprite = BOSS_BUNNY_KING;
    } else if (b.type === 'golem') {
        // bob slightly when walking
        sprite = BOSS_GOLEM;
    } else {
        sprite = BOSS_STORM_CROW;
    }
    let drawY = b.y;
    if (b.type === 'golem') {
        let bob = Math.floor(frameCount / 16) % 2 === 0 ? 0 : -3;
        drawY += bob;
    }
    drawSprite(sprite, sx, drawY, S);
    // Flash white on hit
    if (b.flashFrames > 0) {
        ctx.globalAlpha = 0.5 * (b.flashFrames / 12);
        ctx.fillStyle = "#fff";
        ctx.fillRect(sx, drawY, b.w, b.h);
        ctx.globalAlpha = 1;
    }
}

function drawBossHUD() {
    if (!boss || !boss.alive) return;
    const barW = 400, barH = 14, barX = W / 2 - barW / 2, barY = 28;
    ctx.fillStyle = "rgba(0,0,0,0.6)";
    ctx.fillRect(barX - 4, barY - 4, barW + 8, barH + 8);
    ctx.fillStyle = "#600";
    ctx.fillRect(barX, barY, barW, barH);
    let ratio = boss.hp / boss.maxHp;
    ctx.fillStyle = ratio > 0.5 ? "#f04040" : ratio > 0.25 ? "#ff8020" : "#ff2020";
    ctx.fillRect(barX, barY, barW * ratio, barH);
    ctx.fillStyle = "#fff";
    ctx.font = "7px 'Press Start 2P', monospace";
    ctx.textAlign = "center";
    ctx.fillText(theme.bossName, W / 2, barY - 6);
    ctx.textAlign = "left";
    // Skull icon
    ctx.fillStyle = "#ff4040";
    ctx.font = "10px monospace";
    ctx.textAlign = "center";
    ctx.fillText("☠", barX - 14, barY + barH);
    ctx.textAlign = "left";
}

function overlap(a, b) {
    return a.x < b.x + b.w && a.x + a.w > b.x &&
           a.y < b.y + b.h && a.y + a.h > b.y;
}

function roundRect(x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + w - r, y);
    ctx.quadraticCurveTo(x + w, y, x + w, y + r);
    ctx.lineTo(x + w, y + h - r);
    ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    ctx.lineTo(x + r, y + h);
    ctx.quadraticCurveTo(x, y + h, x, y + h - r);
    ctx.lineTo(x, y + r);
    ctx.quadraticCurveTo(x, y, x + r, y);
    ctx.fill();
}

// ── platform collision ────────────────────────────────────────
// Called after gravity is applied and ground check is done.
// Resolves player vs all platforms in world space.
function resolvePlatforms() {
    let pLeft  = player.x + 10;
    let pRight = player.x + player.w - 4;
    let pTop   = player.y;
    let pBot   = player.y + SPRITE_SIZE;
    let prevBot = player.prevY + SPRITE_SIZE;

    for (let plat of PLATFORMS) {
        // Horizontal cull (world X)
        if (pRight <= plat.x || pLeft >= plat.x + plat.w) continue;

        let surf = plat.top;              // screen Y of walkable top
        let bot  = plat.top + PLAT_H;    // screen Y of platform underside

        // ── Land on top: falling player whose feet crossed the surface
        if (player.vy >= 0 && prevBot <= surf + 6 && pBot >= surf) {
            if (player.vy > 3) spawnDust(player.x - cameraX + 28, surf);
            player.y = surf - SPRITE_SIZE;
            player.vy = 0;
            player.onGround = true;
            return; // one platform per frame
        }

        // ── Bump head: rising player whose head crossed the underside
        if (player.vy < 0 && pTop <= bot && player.prevY >= bot) {
            player.y = bot;
            player.vy = 0;
            return;
        }

        // ── Side block: player body overlaps platform sides
        if (pBot > surf + 4 && pTop < bot - 2) {
            let overlapL = pRight - plat.x;
            let overlapR = (plat.x + plat.w) - pLeft;
            if (overlapL > 0 && overlapR > 0) {
                if (overlapL <= overlapR && overlapL < 20) {
                    player.x -= overlapL;
                } else if (overlapR < overlapL && overlapR < 20) {
                    player.x += overlapR;
                }
            }
        }
    }
}

// ── background drawing ────────────────────────────────────────
function drawSky() {
    let grad = ctx.createLinearGradient(0, 0, 0, H);
    grad.addColorStop(0, theme.skyTop);
    grad.addColorStop(0.7, theme.skyMid);
    grad.addColorStop(1, theme.skyBot);
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, H);

    // twinkling stars
    ctx.fillStyle = theme === LEVEL_THEMES[0] ? "#fff" : theme === LEVEL_THEMES[1] ? "#ffaaaa" : "#ccccff";
    let seed = 42;
    for (let i = 0; i < 35; i++) {
        seed = (seed * 16807) % 2147483647;
        let sx = seed % W;
        seed = (seed * 16807) % 2147483647;
        let sy = seed % (H * 0.45);
        let twinkle = Math.sin(frameCount * 0.03 + i) * 0.3 + 0.5;
        ctx.globalAlpha = twinkle * 0.35;
        ctx.fillRect(sx, sy, 2, 2);
    }
    ctx.globalAlpha = 1;

    // Level 3: occasional lightning flash in background
    if (theme === LEVEL_THEMES[2] && Math.floor(frameCount / 8) % 200 === 0) {
        ctx.globalAlpha = 0.12;
        ctx.fillStyle = "#8080ff";
        ctx.fillRect(0, 0, W, H);
        ctx.globalAlpha = 1;
    }
}

function drawClouds() {
    for (let c of clouds) {
        c.x -= c.speed;
        if (c.x + c.w < 0) c.x = W + 20;
        ctx.fillStyle = "rgba(255,255,255,0.05)";
        roundRect(c.x, c.y, c.w, c.h, c.h / 2);
    }
}

function drawBushes() {
    for (let bu of bushes) {
        let sx = bu.x - cameraX;
        if (sx + bu.size < 0 || sx > W) continue;
        ctx.fillStyle = bu.shade;
        roundRect(sx, GROUND_Y + SPRITE_SIZE - bu.size * 0.5, bu.size, bu.size * 0.6, bu.size * 0.25);
    }
}

function drawGround() {
    let offA = cameraX % 8;
    let offB = cameraX % 20;
    let offC = cameraX % 60;

    // grass top
    ctx.fillStyle = theme.grassLight;
    ctx.fillRect(0, GROUND_Y + SPRITE_SIZE - 4, W, 8);
    ctx.fillStyle = theme.grassDark;
    ctx.fillRect(0, GROUND_Y + SPRITE_SIZE + 2, W, 4);

    // grass tufts
    for (let i = 0; i < W + 12; i += 8) {
        let gx = i - offA;
        let seed = (Math.floor((gx + cameraX) / 8) * 7) % 4;
        let grassH = 4 + seed * 3;
        ctx.fillStyle = seed % 2 === 0 ? theme.grassLight : theme.grassDark;
        ctx.fillRect(gx, GROUND_Y + SPRITE_SIZE - 4 - grassH, S, grassH + 2);
    }

    // dirt fill
    ctx.fillStyle = theme.dirtLight;
    ctx.fillRect(0, GROUND_Y + SPRITE_SIZE + 6, W, H);
    ctx.fillStyle = theme.dirtDark;
    for (let i = 0; i < W + 20; i += 20) {
        let gx = i - offB;
        ctx.fillRect(gx, GROUND_Y + SPRITE_SIZE + 14, 10, 3);
        ctx.fillRect(gx + 8, GROUND_Y + SPRITE_SIZE + 22, 8, 2);
    }

    // flowers / decorations
    for (let i = 0; i < W + 40; i += 60) {
        let fx = i - offC;
        let seed2 = Math.floor((fx + cameraX) / 60) % 5;
        if (seed2 < 2) {
            let fc = seed2 === 0 ? theme.flowerA : theme.flowerB;
            ctx.fillStyle = fc;
            ctx.fillRect(fx + 2, GROUND_Y + SPRITE_SIZE - 12, 4, 4);
            ctx.fillRect(fx - 1, GROUND_Y + SPRITE_SIZE - 9, 4, 4);
            ctx.fillRect(fx + 5, GROUND_Y + SPRITE_SIZE - 9, 4, 4);
            ctx.fillStyle = "#ffd030";
            ctx.fillRect(fx + 2, GROUND_Y + SPRITE_SIZE - 9, 4, 4);
            ctx.fillStyle = theme.grassLight;
            ctx.fillRect(fx + 3, GROUND_Y + SPRITE_SIZE - 6, 2, 6);
        }
    }
}

function drawPlatforms() {
    for (let plat of PLATFORMS) {
        let sx = plat.x - cameraX;
        if (sx + plat.w < 0 || sx > W) continue;

        // grass top
        ctx.fillStyle = theme.grassLight;
        ctx.fillRect(sx, plat.top, plat.w, 6);
        ctx.fillStyle = theme.grassDark;
        ctx.fillRect(sx, plat.top + 4, plat.w, 4);

        // dirt body
        ctx.fillStyle = theme.dirtLight;
        ctx.fillRect(sx, plat.top + 7, plat.w, PLAT_H - 7);
        ctx.fillStyle = theme.dirtDark;
        ctx.fillRect(sx + 4, plat.top + 12, Math.max(0, plat.w - 8), 3);

        // grass tufts along top
        ctx.fillStyle = theme.grassLight;
        for (let gx = sx + 2; gx < sx + plat.w - 2; gx += 6) {
            let grassH = 3 + ((Math.floor(gx + cameraX) * 7) % 3);
            ctx.fillRect(gx, plat.top - grassH + 2, 3, grassH);
        }
    }
}

function drawGoal() {
    let sx = GOAL_X - cameraX;
    if (sx + 100 < 0 || sx > W + 20) return;

    // post
    ctx.fillStyle = "#8B6340";
    ctx.fillRect(sx + 28, GROUND_Y - 50, 8, SPRITE_SIZE + 54);
    ctx.fillStyle = "#6B4820";
    ctx.fillRect(sx + 32, GROUND_Y - 50, 4, SPRITE_SIZE + 54);

    // sign board
    ctx.fillStyle = "#F0C060";
    ctx.fillRect(sx, GROUND_Y - 76, 80, 36);
    ctx.fillStyle = "#D0A040";
    ctx.fillRect(sx, GROUND_Y - 76, 80, 4);
    ctx.fillRect(sx, GROUND_Y - 76, 4, 36);
    ctx.fillRect(sx + 76, GROUND_Y - 76, 4, 36);
    ctx.fillRect(sx, GROUND_Y - 44, 80, 4);

    ctx.fillStyle = "#5c3d2e";
    ctx.font = "8px 'Press Start 2P', monospace";
    ctx.textAlign = "center";
    ctx.fillText("GOAL!", sx + 40, GROUND_Y - 52);
    ctx.textAlign = "left";

    // small carrot icon on sign
    drawSprite(CARROT_SPRITE, sx + 12, GROUND_Y - 44, 2);
}

function drawProgressBar() {
    let progress = Math.min(1, player.x / GOAL_X);
    ctx.fillStyle = "rgba(0,0,0,0.5)";
    ctx.fillRect(10, 8, W - 20, 10);
    ctx.fillStyle = "#5c9e48";
    ctx.fillRect(10, 8, (W - 20) * progress, 10);
    // marker dot
    ctx.fillStyle = "#ffd866";
    ctx.fillRect(10 + (W - 20) * progress - 2, 5, 4, 16);
    // label
    ctx.fillStyle = "#8ba";
    ctx.font = "7px 'Press Start 2P', monospace";
    ctx.textAlign = "right";
    ctx.fillText("GOAL", W - 14, 16);
    ctx.textAlign = "left";
}

// ── draw entities using sprite data ──────────────────────────
function drawPlayerSprite(pl) {
    let sx = pl.x - cameraX;
    // shadow at feet
    ctx.globalAlpha = 0.2;
    ctx.fillStyle = "#000";
    roundRect(sx, pl.y + SPRITE_SIZE - 4, SPRITE_SIZE - 8, 8, 4);
    ctx.globalAlpha = 1;

    let frame;
    if (!pl.onGround) {
        frame = FARMER_SPRITE;
    } else {
        frame = (Math.floor(frameCount / 8) % 2 === 0) ? FARMER_SPRITE : FARMER_WALK;
    }
    drawSprite(frame, sx, pl.y, S);
}

function drawCarrotSprite(c) {
    let sx = c.x - cameraX;
    if (sx < -SPRITE_SIZE || sx > W) return;
    let wobble = Math.sin(frameCount * 0.5 + c.x * 0.05) * 2;
    drawSprite(CARROT_SPRITE, sx, c.y + wobble, S);
}

function drawAmmoPickup(ap) {
    let sx = ap.x - cameraX;
    if (sx < -32 || sx > W + 32) return;
    // Bob up and down
    let bob = Math.sin(frameCount * 0.08 + ap.x * 0.01) * 4;
    drawSprite(CARROT_SPRITE, sx, ap.y + bob, 2);
    // Label showing count
    ctx.fillStyle = "#ffd866";
    ctx.font = "6px 'Press Start 2P', monospace";
    ctx.textAlign = "center";
    ctx.fillText("+" + ap.count, sx + 16, ap.y + bob - 4);
    ctx.textAlign = "left";
}

function drawEnemySprite(en) {
    let sx = en.x - cameraX;
    if (sx < -SPRITE_SIZE || sx > W + SPRITE_SIZE) return;

    if (en.type === 'bunny') {
        ctx.globalAlpha = 0.15;
        ctx.fillStyle = "#000";
        roundRect(sx + 4, en.y + SPRITE_SIZE - 4, SPRITE_SIZE - 12, 6, 3);
        ctx.globalAlpha = 1;
        let hop = Math.floor(frameCount / 10) % 4;
        let hopY = (hop === 1) ? -6 : (hop === 3) ? -3 : 0;
        let frame = (hop === 1 || hop === 3) ? BUNNY_HOP : BUNNY_SPRITE;
        drawSprite(frame, sx, en.y + hopY, S);
    } else if (en.type === 'tortoise') {
        ctx.globalAlpha = 0.15;
        ctx.fillStyle = "#000";
        roundRect(sx + 4, en.y + SPRITE_SIZE - 4, SPRITE_SIZE - 12, 6, 3);
        ctx.globalAlpha = 1;
        let bob = Math.floor(frameCount / 20) % 2 === 0 ? 0 : -2;
        drawSprite(TORTOISE_SPRITE, sx, en.y + bob, S);
        // HP bar
        let barW = en.w;
        ctx.fillStyle = "#500";
        ctx.fillRect(sx, en.y - 8, barW, 4);
        ctx.fillStyle = "#4d0";
        ctx.fillRect(sx, en.y - 8, barW * (en.hp / en.maxHp), 4);
    } else if (en.type === 'fox') {
        ctx.globalAlpha = 0.15;
        ctx.fillStyle = "#000";
        roundRect(sx + 4, en.y + SPRITE_SIZE - 4, SPRITE_SIZE - 12, 6, 3);
        ctx.globalAlpha = 1;
        let run = Math.floor(frameCount / 4) % 2 === 0 ? 0 : -3;
        drawSprite(FOX_SPRITE, sx, en.y + run, S);
    } else if (en.type === 'crow') {
        let flap = Math.floor(frameCount / 8) % 2 === 0;
        drawSprite(flap ? CROW_SPRITE : CROW_FLAP, sx, en.y, S);
    }

    // Flash white overlay on hit
    if (en.flashFrames > 0) {
        ctx.globalAlpha = 0.5 * (en.flashFrames / 12);
        ctx.fillStyle = "#fff";
        ctx.fillRect(sx + 2, en.y + 2, en.w, en.h - 4);
        ctx.globalAlpha = 1;
    }
}

// ── particles ─────────────────────────────────────────────────
// Particles use screen-space coords (pass screen X when spawning).
function spawnPoof(x, y, pts) {
    let colors = ["#fff", "#ffd866", "#ff9040", "#fff8e0", "#ffa"];
    for (let i = 0; i < 14; i++) {
        let angle = (i / 14) * Math.PI * 2 + Math.random() * 0.5;
        let spd = 1.5 + Math.random() * 3.5;
        particles.push({
            x, y,
            vx: Math.cos(angle) * spd,
            vy: Math.sin(angle) * spd - 1,
            life: 16 + Math.random() * 10,
            maxLife: 26,
            size: S + Math.random() * S * 1.5,
            color: colors[Math.floor(Math.random() * colors.length)],
        });
    }
    particles.push({
        x, y: y - 14, vx: 0, vy: -1.5,
        life: 35, maxLife: 35, size: 0, color: "#ffd866",
        text: "+" + (pts || 10),
    });
}

function spawnDust(x, y) {
    for (let i = 0; i < 4; i++) {
        particles.push({
            x, y,
            vx: -1.5 + Math.random() * 3,
            vy: -Math.random() * 2.5,
            life: 10 + Math.random() * 6,
            maxLife: 16,
            size: S + Math.random() * S,
            color: "#a09080",
        });
    }
}

function updateParticles() {
    for (let pt of particles) {
        pt.x += pt.vx;
        pt.y += pt.vy;
        if (!pt.text) pt.vy += 0.08;
        pt.life--;
    }
    particles = particles.filter(pt => pt.life > 0);
}

function drawParticles() {
    for (let pt of particles) {
        let alpha = Math.min(1, pt.life / (pt.maxLife * 0.4));
        ctx.globalAlpha = alpha;
        if (pt.text) {
            ctx.fillStyle = pt.color;
            ctx.font = "bold 14px 'Press Start 2P', monospace";
            ctx.textAlign = "center";
            ctx.fillText(pt.text, pt.x, pt.y);
            ctx.textAlign = "left";
        } else {
            ctx.fillStyle = pt.color;
            ctx.fillRect(Math.round(pt.x), Math.round(pt.y), pt.size, pt.size);
        }
    }
    ctx.globalAlpha = 1;
}

// ── game loop ─────────────────────────────────────────────────
function update() {
    if (state !== "running") return;
    frameCount++;

    // Time-based score
    if (frameCount % 10 === 0) {
        score++;
        document.getElementById("score").textContent = score;
    }

    // Store previous Y for collision
    player.prevY = player.y;

    // Horizontal movement
    if (keys["ArrowRight"]) {
        player.x = Math.min(player.x + MOVE_SPEED, LEVEL_WIDTH - SPRITE_SIZE);
    }
    if (keys["ArrowLeft"]) {
        player.x = Math.max(player.x - MOVE_SPEED, 0);
    }

    // Jump
    if (keys["ArrowUp"] && player.onGround) {
        player.vy = JUMP_VEL;
        player.onGround = false;
    }
    // Fast fall
    if (keys["ArrowDown"] && !player.onGround) {
        player.vy += 1.0;
    }

    // Apply gravity
    player.vy += GRAVITY;
    player.y += player.vy;
    player.onGround = false;

    // Ground collision
    if (player.y >= GROUND_Y) {
        if (player.vy > 3) spawnDust(player.x - cameraX + 28, GROUND_Y + SPRITE_SIZE - 6);
        player.y = GROUND_Y;
        player.vy = 0;
        player.onGround = true;
    }

    // Platform collision
    resolvePlatforms();

    // Update camera (player at ~W/3 from left, clamped to level bounds)
    let targetCam = player.x - W / 3;
    cameraX = Math.max(0, Math.min(targetCam, LEVEL_WIDTH - W));

    // Shooting
    if (shootTimer > 0) shootTimer--;
    if (keys["Space"] && shootTimer === 0 && ammo > 0) {
        carrots.push({
            x: player.x + SPRITE_SIZE,
            y: player.y + 30,
            w: SPRITE_SIZE, h: 6 * S
        });
        shootTimer = SHOOT_COOLDOWN;
        ammo--;
        document.getElementById("ammo").textContent = ammo;
    }

    // Move carrots (world space)
    for (let c of carrots) c.x += CARROT_SPEED;
    carrots = carrots.filter(c => c.x < player.x + W);

    // Update enemy movement
    for (let en of enemies) {
        if (!en.alive) continue;
        if (en.flashFrames > 0) en.flashFrames--;
        if (en.type === 'tortoise') {
            // Track player only when within 280px, otherwise patrol a fixed range
            let dx = player.x - en.x;
            if (Math.abs(dx) < 280) {
                let dir = dx > 0 ? 1 : -1;
                en.x += dir * en.speed;
            } else {
                // Patrol ±120px around spawn
                en.x += en.patrolDir * en.speed * 0.5;
                if (en.x > en.baseX + 120) { en.patrolDir = -1; }
                else if (en.x < en.baseX - 120) { en.patrolDir = 1; }
            }
        } else if (en.type === 'fox') {
            let dx = player.x - en.x;
            if (Math.abs(dx) < 320) {
                // Charge straight at player at fixed speed (no acceleration drift)
                let dir = dx > 0 ? 1 : -1;
                en.vx = dir * en.speed;
            } else {
                // Patrol ±80px around spawn when player is far
                en.vx = en.patrolDir * en.speed * 0.4;
                if (en.x > en.baseX + 80) { en.patrolDir = -1; }
                else if (en.x < en.baseX - 80) { en.patrolDir = 1; }
            }
            en.x += en.vx;
        } else if (en.type === 'crow') {
            // Patrol ±250px around spawn horizontally instead of drifting forever left
            en.x += en.patrolDir * en.speed;
            if (en.x > en.baseX + 250) { en.patrolDir = -1; }
            else if (en.x < en.baseX - 250) { en.patrolDir = 1; }
            en.flyPhase += 0.05;
            en.y = en.flyBaseY + Math.sin(en.flyPhase) * 30;
        }
    }

    // Spawn boss when player approaches goal
    if (!bossSpawned && player.x > GOAL_X - 900) {
        spawnBoss();
    }
    if (bossWarningFrames > 0) bossWarningFrames--;

    // Update boss
    updateBoss();

    // Carrot vs enemy (with hp system)
    for (let c of carrots) {
        let hit = false;
        // Hit boss first
        if (boss && boss.alive && overlap(c, boss)) {
            c.x = LEVEL_WIDTH + 200;
            boss.hp--;
            boss.flashFrames = 12;
            if (boss.hp <= 0) {
                boss.alive = false;
                score += theme.bossPoints;
                document.getElementById("score").textContent = score;
                spawnPoof(boss.x - cameraX + boss.w / 2, boss.y + boss.h / 2, theme.bossPoints);
                // Big celebration burst
                for (let bi = 0; bi < 20; bi++) {
                    let ang = Math.random() * Math.PI * 2;
                    let spd = 2 + Math.random() * 5;
                    particles.push({
                        x: boss.x - cameraX + boss.w / 2,
                        y: boss.y + boss.h / 2,
                        vx: Math.cos(ang) * spd, vy: Math.sin(ang) * spd - 2,
                        life: 30 + Math.random() * 20, maxLife: 50,
                        size: S + Math.random() * S * 2,
                        color: ["#ffd866","#ff9040","#50ff80","#ff40ff","#40ffff"][bi % 5],
                    });
                }
            }
            hit = true;
        }
        if (!hit) {
            for (let en of enemies) {
                if (en.alive && overlap(c, en)) {
                    c.x = LEVEL_WIDTH + 200;
                    en.hp--;
                    if (en.hp <= 0) {
                        en.alive = false;
                        let pts = en.type === 'tortoise' ? 20 : en.type === 'fox' ? 15 : en.type === 'crow' ? 15 : 10;
                        score += pts;
                        document.getElementById("score").textContent = score;
                        spawnPoof(en.x - cameraX + SPRITE_SIZE / 2, en.y + SPRITE_SIZE / 2, pts);
                        // Drop ammo pickup based on enemy difficulty
                        let ammoDrop = en.type === 'tortoise' ? 3 : en.type === 'fox' ? 2 : en.type === 'crow' ? 2 : 1;
                        ammoPickups.push({
                            x: en.x + (SPRITE_SIZE - 8) / 2,
                            y: en.y,
                            w: 16, h: 24,
                            count: ammoDrop
                        });
                    } else {
                        en.flashFrames = 12;
                    }
                    break;
                }
            }
        }
    }
    enemies = enemies.filter(en => en.alive);

    // Collect ammo pickups
    let playerHit = { x: player.x + 8, y: player.y, w: player.w - 16, h: player.h };
    ammoPickups = ammoPickups.filter(ap => {
        if (overlap(playerHit, ap)) {
            ammo = Math.min(MAX_AMMO, ammo + ap.count);
            document.getElementById("ammo").textContent = ammo;
            spawnPoof(ap.x - cameraX, ap.y, ap.count);
            return false;
        }
        return true;
    });

    // Update boss projectiles
    for (let bp of bossProjectiles) {
        bp.x += bp.vx;
        bp.y += bp.vy;
        if (bp.type === 'rock') bp.vy += 0.3;
        if (bp.type === 'lightning') bp.strikeDelay--;
        bp.life--;
    }
    bossProjectiles = bossProjectiles.filter(bp => bp.life > 0);

    // Player vs boss projectiles
    let pH = { x: player.x + 12, y: player.y + 8, w: player.w - 20, h: player.h - 12 };
    for (let bp of bossProjectiles) {
        if (bp.type === 'lightning' && bp.strikeDelay > 0) continue;
        let bpH = bp.type === 'lightning'
            ? { x: bp.x - bp.w / 2, y: 0, w: bp.w, h: H }
            : { x: bp.x, y: bp.y, w: bp.w, h: bp.h };
        if (overlap(pH, bpH)) { die(); return; }
    }

    // Player vs enemy (tighter hitboxes, world space)
    for (let en of enemies) {
        let sx = en.x - cameraX;
        if (sx < -SPRITE_SIZE || sx > W + SPRITE_SIZE) continue;
        let eH = { x: en.x + 8, y: en.y + 8, w: en.w - 12, h: en.h - 12 };
        if (overlap(pH, eH)) {
            die();
            return;
        }
    }

    // Player vs boss body
    if (boss && boss.alive) {
        let bH = { x: boss.x + 10, y: boss.y + 10, w: boss.w - 20, h: boss.h - 10 };
        if (overlap(pH, bH)) { die(); return; }
    }

    // Win condition: boss must be dead first, then reach goal
    if (bossSpawned && (!boss || !boss.alive) && player.x + SPRITE_SIZE / 2 >= GOAL_X) {
        winGame();
        return;
    }

    updateParticles();
}

function die() {
    state = "dead";
    let deathSX = player.x - cameraX;
    for (let i = 0; i < 24; i++) {
        let angle = Math.random() * Math.PI * 2;
        let spd = 1 + Math.random() * 4;
        particles.push({
            x: deathSX + 28, y: player.y + 32,
            vx: Math.cos(angle) * spd, vy: Math.sin(angle) * spd - 2,
            life: 22 + Math.random() * 15, maxLife: 37,
            size: S + Math.random() * S,
            color: ["#ff4040", "#ff8040", "#ffd040", "#fff"][Math.floor(Math.random() * 4)],
        });
    }
    if (score > hiScore) {
        hiScore = score;
        localStorage.setItem("sixseven_hi", hiScore);
        document.getElementById("hiscore").textContent = hiScore;
    }
    document.getElementById("message").textContent =
        "GAME OVER \u2014 SCORE: " + score + " \u2014 PRESS SPACE TO RESTART";
}

function winGame() {
    let bonusPoints = currentLevel < MAX_LEVELS ? 100 : 200;
    score += bonusPoints;
    document.getElementById("score").textContent = score;
    if (score > hiScore) {
        hiScore = score;
        localStorage.setItem("sixseven_hi", hiScore);
        document.getElementById("hiscore").textContent = hiScore;
    }
    // Celebration burst
    for (let i = 0; i < 30; i++) {
        let angle = Math.random() * Math.PI * 2;
        let spd = 2 + Math.random() * 5;
        particles.push({
            x: W / 2 + (Math.random() - 0.5) * 200,
            y: H / 2,
            vx: Math.cos(angle) * spd,
            vy: Math.sin(angle) * spd - 3,
            life: 30 + Math.random() * 20,
            maxLife: 50,
            size: S + Math.random() * S * 2,
            color: ["#ffd866","#ff9040","#50ff80","#80d8ff","#ff80d0"][Math.floor(Math.random() * 5)],
        });
    }
    if (currentLevel < MAX_LEVELS) {
        state = "level_complete";
        document.getElementById("message").textContent =
            "LEVEL " + currentLevel + " COMPLETE! PRESS SPACE FOR LEVEL " + (currentLevel + 1);
    } else {
        state = "win";
        document.getElementById("message").textContent =
            "YOU WIN THE GAME! SCORE: " + score + " \u2014 PRESS SPACE TO RESTART";
    }
}

function drawBossProjectiles() {
    for (let bp of bossProjectiles) {
        if (bp.type === 'boss_carrot') {
            ctx.fillStyle = "#ff6020";
            let sx = bp.x - cameraX;
            ctx.fillRect(sx, bp.y, 16, 10);
            ctx.fillStyle = "#3da040";
            ctx.fillRect(sx - 4, bp.y - 4, 6, 6);
        } else if (bp.type === 'shockwave') {
            ctx.fillStyle = "#606068";
            ctx.fillRect(bp.x - cameraX, bp.y, bp.w, bp.h);
            ctx.fillStyle = "#a0a0a8";
            ctx.fillRect(bp.x - cameraX, bp.y, bp.w, 4);
        } else if (bp.type === 'rock') {
            ctx.fillStyle = "#707078";
            ctx.fillRect(bp.x - cameraX - bp.w / 2, bp.y, bp.w, bp.h);
            ctx.fillStyle = "#505058";
            ctx.fillRect(bp.x - cameraX - bp.w / 2 + 4, bp.y + 4, bp.w - 8, 3);
        } else if (bp.type === 'lightning') {
            let lx = bp.x - cameraX - bp.w / 2;
            if (bp.strikeDelay > 0) {
                // Warning: thin white line
                ctx.globalAlpha = 0.5 * (1 - bp.strikeDelay / 20);
                ctx.fillStyle = "#ffffff";
                ctx.fillRect(lx + 4, 0, 4, H);
            } else {
                // Strike: thick yellow bolt
                ctx.globalAlpha = Math.min(1, bp.life / 10);
                ctx.fillStyle = sc4;
                ctx.fillRect(lx, 0, bp.w, H);
                ctx.fillStyle = "#ffffff";
                ctx.fillRect(lx + 4, 0, 4, H);
            }
            ctx.globalAlpha = 1;
        }
    }
}

function draw() {
    drawSky();
    drawClouds();

    if (state === "idle") {
        drawBushes();
        drawGround();

        ctx.fillStyle = "#ffd866";
        ctx.font = "24px 'Press Start 2P', monospace";
        ctx.textAlign = "center";
        ctx.fillText("SIXSEVEN", W / 2, H / 2 - 70);
        ctx.fillStyle = "#8ba";
        ctx.font = "11px 'Press Start 2P', monospace";
        ctx.fillText("Defend your garden!", W / 2, H / 2 - 38);
        ctx.fillText("3 levels — defeat each boss to advance!", W / 2, H / 2 - 16);
        ctx.fillStyle = "#6a7a6a";
        ctx.font = "9px 'Press Start 2P', monospace";
        ctx.fillText("ARROWS: move/jump   DOWN: fast fall   SPACE: shoot", W / 2, H / 2 + 20);
        ctx.textAlign = "left";

        // idle preview sprites
        drawSprite(FARMER_SPRITE, W / 2 - 200, GROUND_Y, S);
        drawSprite(BUNNY_SPRITE, W / 2 - 50, GROUND_Y, S);
        drawSprite(BOSS_BUNNY_KING, W / 2 + 30, GROUND_Y - 32, S);
        drawSprite(BOSS_GOLEM, W / 2 + 150, GROUND_Y - 32, S);
        drawSprite(BOSS_STORM_CROW, W / 2 + 270, GROUND_Y - 64, S);
        return;
    }

    drawPlatforms();
    drawBushes();
    drawGround();
    // Only show goal marker once boss is defeated (or not yet spawned)
    if (!bossSpawned || (boss && !boss.alive)) drawGoal();
    drawPlayerSprite(player);
    for (let c of carrots) drawCarrotSprite(c);
    for (let ap of ammoPickups) drawAmmoPickup(ap);
    for (let en of enemies) drawEnemySprite(en);
    if (boss && boss.alive) drawBossSprite(boss);
    drawBossProjectiles();
    drawParticles();
    drawProgressBar();

    // Level indicator
    ctx.fillStyle = "#8ba";
    ctx.font = "8px 'Press Start 2P', monospace";
    ctx.textAlign = "left";
    ctx.fillText("LVL " + currentLevel + "/" + MAX_LEVELS, 14, 44);

    // Boss HUD
    if (boss && boss.alive) {
        drawBossHUD();
    }

    // Boss incoming warning
    if (bossWarningFrames > 0) {
        let alpha = bossWarningFrames > 60 ? 1 : bossWarningFrames / 60;
        ctx.globalAlpha = alpha;
        ctx.fillStyle = "rgba(0,0,0,0.6)";
        ctx.fillRect(W / 2 - 220, H / 2 - 30, 440, 60);
        ctx.fillStyle = "#ff4040";
        ctx.font = "16px 'Press Start 2P', monospace";
        ctx.textAlign = "center";
        ctx.fillText("⚠  BOSS INCOMING!  ⚠", W / 2, H / 2 - 6);
        ctx.fillStyle = "#ffd866";
        ctx.font = "9px 'Press Start 2P', monospace";
        ctx.fillText(theme.bossName, W / 2, H / 2 + 16);
        ctx.globalAlpha = 1;
        ctx.textAlign = "left";
    }

    if (state === "dead") {
        ctx.fillStyle = "rgba(0,0,0,0.55)";
        ctx.fillRect(0, 0, W, H);
        ctx.fillStyle = "#ff5050";
        ctx.font = "24px 'Press Start 2P', monospace";
        ctx.textAlign = "center";
        ctx.fillText("GAME OVER", W / 2, H / 2 - 20);
        ctx.fillStyle = "#ffd866";
        ctx.font = "14px 'Press Start 2P', monospace";
        ctx.fillText("SCORE: " + score, W / 2, H / 2 + 14);
        if (score >= hiScore && hiScore > 0) {
            ctx.fillStyle = "#50ff80";
            ctx.font = "10px 'Press Start 2P', monospace";
            ctx.fillText("NEW BEST!", W / 2, H / 2 + 40);
        }
        ctx.textAlign = "left";
        drawParticles();
    }

    if (state === "level_complete") {
        ctx.fillStyle = "rgba(0,0,0,0.6)";
        ctx.fillRect(0, 0, W, H);
        ctx.fillStyle = "#50ff80";
        ctx.font = "20px 'Press Start 2P', monospace";
        ctx.textAlign = "center";
        ctx.fillText("LEVEL " + currentLevel + " COMPLETE!", W / 2, H / 2 - 50);
        ctx.fillStyle = "#ff9040";
        ctx.font = "12px 'Press Start 2P', monospace";
        ctx.fillText(theme.bossName + " DEFEATED!", W / 2, H / 2 - 16);
        ctx.fillStyle = "#ffd866";
        ctx.font = "12px 'Press Start 2P', monospace";
        ctx.fillText("SCORE: " + score, W / 2, H / 2 + 14);
        ctx.fillStyle = "#8ba";
        ctx.font = "9px 'Press Start 2P', monospace";
        ctx.fillText("PRESS SPACE FOR LEVEL " + (currentLevel + 1), W / 2, H / 2 + 44);
        ctx.textAlign = "left";
        drawParticles();
    }

    if (state === "win") {
        ctx.fillStyle = "rgba(0,0,0,0.5)";
        ctx.fillRect(0, 0, W, H);
        ctx.fillStyle = "#ffd866";
        ctx.font = "22px 'Press Start 2P', monospace";
        ctx.textAlign = "center";
        ctx.fillText("YOU WIN THE GAME!", W / 2, H / 2 - 40);
        ctx.fillStyle = "#ff9040";
        ctx.font = "11px 'Press Start 2P', monospace";
        ctx.fillText("ALL 3 BOSSES DEFEATED!", W / 2, H / 2 - 8);
        ctx.fillStyle = "#50ff80";
        ctx.font = "14px 'Press Start 2P', monospace";
        ctx.fillText("SCORE: " + score, W / 2, H / 2 + 22);
        ctx.fillStyle = "#8ba";
        ctx.font = "9px 'Press Start 2P', monospace";
        ctx.fillText("PRESS SPACE TO PLAY AGAIN", W / 2, H / 2 + 52);
        ctx.textAlign = "left";
        drawParticles();
    }
}

function loop() {
    update();
    draw();
    requestAnimationFrame(loop);
}

loop();
</script>
</body>
</html>
