// ============================================================

const SPRITE_SIZE = 16 * S;        // 64px
const BOSS_SIZE = 24 * S;          // 96px
const GROUND_Y = H - 90;          // 390: top of ground surface
const MOVE_SPEED = 240;

// ============================================================
// Utility
// ============================================================
function hexToNum(hex) {
    return parseInt(hex.replace('#',''), 16);
}

function seededRandom(seed) {
    let s = seed;
    return function() {
        s = (s * 16807 + 0) % 2147483647;
        return (s - 1) / 2147483646;
    };
}

function lerpColor(a, b, t) {
    let ar = (a >> 16) & 0xff, ag = (a >> 8) & 0xff, ab = a & 0xff;
    let br = (b >> 16) & 0xff, bg = (b >> 8) & 0xff, bb = b & 0xff;
    let rr = Math.round(ar + (br - ar) * t);
    let rg = Math.round(ag + (bg - ag) * t);
    let rb = Math.round(ab + (bb - ab) * t);
    return (rr << 16) | (rg << 8) | rb;
}

function weightedPick(weights) {
    let total = weights.reduce((a,b) => a+b, 0);
    let r = Math.random() * total;
    for (let i = 0; i < weights.length; i++) {
        r -= weights[i];
        if (r <= 0) return i;
    }
    return weights.length - 1;
}

// ============================================================
// BootScene
// ============================================================
class BootScene extends Phaser.Scene {
    constructor() { super('BootScene'); }

    preload() {
        let cx = W / 2, cy = H / 2;
        let loadText = this.add.text(cx, cy, 'Loading...', {
            fontFamily: FONT, fontSize: '16px', color: '#ffd866'
        }).setOrigin(0.5);

        this.load.atlas('sprites', 'static/sprites/spritesheet.png', 'static/sprites/phaser-atlas.json');
    }

    create() {
        // Wait a tick for font to load, then start menu
        this.time.delayedCall(200, () => {
            this.scene.start('MenuScene');
        });
    }
}

// ============================================================
// MenuScene
// ============================================================
class MenuScene extends Phaser.Scene {
    constructor() { super('MenuScene'); }

    create() {
        let g = this.add.graphics();
        // gradient sky
        for (let y = 0; y < H; y++) {
            let t = y / H;
            let c = lerpColor(0x16213e, 0x0d1117, t);
            g.fillStyle(c, 1);
            g.fillRect(0, y, W, 1);
        }

        this.add.text(W/2, 80, 'SIXSEVEN', {
            fontFamily: FONT, fontSize: '36px', color: '#ffd866'
        }).setOrigin(0.5);

        this.add.text(W/2, 130, 'Defend your garden!', {
            fontFamily: FONT, fontSize: '12px', color: '#8ba898'
        }).setOrigin(0.5);

        this.add.text(W/2, 170, '6 levels -- defeat each boss to advance!', {
            fontFamily: FONT, fontSize: '9px', color: '#7a8a7a'
        }).setOrigin(0.5);

        this.add.text(W/2, 210, 'ARROWS: move/jump  DOWN/CTRL: crouch  SPACE: shoot', {
            fontFamily: FONT, fontSize: '8px', color: '#6a7a6a'
        }).setOrigin(0.5);

        this.add.text(W/2, 230, 'Shoot ? BLOCKS for power-ups!', {
            fontFamily: FONT, fontSize: '7px', color: '#ddaa00'
        }).setOrigin(0.5);

        // preview sprites
        this.add.image(W/2 - 100, 290, 'sprites', 'FARMER_SPRITE').setScale(S);
        this.add.image(W/2, 290, 'sprites', 'BUNNY_SPRITE').setScale(S);
        this.add.image(W/2 + 100, 290, 'sprites', 'BOSS_BUNNY_KING').setScale(S);

        let blink = this.add.text(W/2, 370, 'PRESS SPACE TO START', {
            fontFamily: FONT, fontSize: '12px', color: '#ffd866'
        }).setOrigin(0.5);

        this.tweens.add({
            targets: blink, alpha: 0, duration: 500,
            yoyo: true, repeat: -1
        });

        let hi = localStorage.getItem('sixseven_hi') || 0;
        this.add.text(W/2, 420, 'HI-SCORE: ' + hi, {
            fontFamily: FONT, fontSize: '10px', color: '#aab8aa'
        }).setOrigin(0.5);

        this.input.keyboard.once('keydown-SPACE', () => {
            this.scene.start('GameScene');
        });
    }
}

// ============================================================
// GameScene -- CORE GAMEPLAY
// ============================================================
class GameScene extends Phaser.Scene {
    constructor() { super('GameScene'); }

    create() {
        this.currentLevel = 0;
        this.score = 0;
        this.hiScore = parseInt(localStorage.getItem('sixseven_hi') || '0');
        this.frameCount = 0;
        this.gameOver = false;
        this.levelComplete = false;
        this.victory = false;
        this.bossWarningActive = false;

        this.startLevel(0);
    }

    // --------------------------------------------------------
    // Start / reset a level
    // --------------------------------------------------------
    startLevel(levelIndex) {
        // Clear everything from previous level
        this.children.removeAll(true);
        this.physics.world.colliders.destroy();
        if (this.tweens) this.tweens.killAll();

        this.currentLevel = levelIndex;
        this.lvl = LEVELS[levelIndex];
        this.levelWidth = this.lvl.levelWidth;
        this.GOAL_X = this.levelWidth - 300;
        this.gameOver = false;
        this.levelComplete = false;
        this.victory = false;
        this.bossWarningActive = false;
        this.bossSpawned = false;
        this.bossDead = false;
        this.bossWarningTimer = 0;
        this.shootTimer = 0;
        this.frameCount = 0;
        this.invincibleTimer = 0;
        this.walkFrame = 0;
        this.walkAnimTimer = 0;
        this.isCrouching = false;
        this.facingRight = true;
        this.overlayShown = false;

        // Power-up state
        this.activePowerups = {};
        this.powerupTimers = {};
        this.shieldActive = false;

        // Breakable blocks
        this.breakableBlocks = [];

        // Boss projectiles array (manually managed)
        this.bossProjectiles = [];
        // Damage zones (ground crack, fire trail, etc.)
        this.damageZones = [];
        // Track player in-air state for landing dust
        this.wasInAir = false;

        // Physics world bounds
        this.physics.world.setBounds(0, 0, this.levelWidth, H);

        // Camera
        this.cameras.main.setBounds(0, 0, this.levelWidth, H);

        // ---- Background ----
        this.bgGraphics = this.add.graphics();
        this.drawStaticBackground();

        // ---- Stars (dynamic) ----
        this.stars = [];
        let rng = seededRandom(levelIndex * 1000 + 7);
        for (let i = 0; i < 35; i++) {
            this.stars.push({
                x: rng() * this.levelWidth,
                y: rng() * (GROUND_Y * 0.5),
                phase: rng() * Math.PI * 2,
                size: 1 + Math.floor(rng() * 2)
            });
        }
        this.starGraphics = this.add.graphics();

        // ---- Clouds (parallax) ----
        this.clouds = [];
        for (let i = 0; i < 6; i++) {
            let cw = 60 + Math.random() * 80;
            let ch = 16 + Math.random() * 12;
            let cloud = this.add.graphics();
            cloud.fillStyle(0xffffff, 0.06 + Math.random() * 0.06);
            cloud.fillRoundedRect(-cw/2, -ch/2, cw, ch, 8);
            cloud.setPosition(Math.random() * this.levelWidth, 30 + Math.random() * 100);
            cloud.setScrollFactor(0.15 + i * 0.08);
            this.clouds.push({ gfx: cloud, speed: 0.1 + Math.random() * 0.3, baseX: cloud.x });
        }

        // ---- Ground / bushes / flowers (static drawn to texture) ----
        this.groundGraphics = this.add.graphics();
        this.drawGround();

        // ---- Platforms ----
        this.platforms = this.physics.add.staticGroup();
        this.platformData = [];
        this.generatePlatforms(levelIndex);
        this.platformGraphics = this.add.graphics();
        this.drawPlatforms();

        // ---- Goal post (hidden until boss is defeated) ----
        this.goalGraphics = this.add.graphics();
        this.goalGraphics.setVisible(false);

        // ---- Player ----
        this.createPlayer();

        // ---- Enemies ----
        this.enemyGroup = this.physics.add.group();
        this.enemyData = [];
        this.spawnEnemies(levelIndex);

        // ---- Carrots (player projectiles) ----
        this.carrots = this.physics.add.group({ allowGravity: false });

        // ---- Pickups ----
        this.pickups = this.physics.add.group();

        // ---- Breakable blocks graphics ----
        this.blockGraphics = this.add.graphics();
        this.generateBreakableBlocks(levelIndex);
        this.drawBreakableBlocks();

        // ---- Boss reference ----
        this.boss = null;
        this.bossGraphics = this.add.graphics(); // for boss HP bar in world

        // ---- Ground collision body ----
        // Ground surface is at GROUND_Y + SPRITE_SIZE - 4 = 450
        // Zone is centered, so place center at 450 + 30 = 480 for a 60px tall body
        let groundSurface = GROUND_Y + SPRITE_SIZE - 4;
        let groundBody = this.add.zone(this.levelWidth / 2, groundSurface + 30, this.levelWidth, 60);
        this.physics.add.existing(groundBody, true);
        this.groundCollider = groundBody;

        // ---- Collisions ----
        this.physics.add.collider(this.player, groundBody);
        this.physics.add.collider(this.player, this.platforms);
        this.physics.add.collider(this.enemyGroup, groundBody);
        this.physics.add.collider(this.enemyGroup, this.platforms);
        this.physics.add.collider(this.pickups, groundBody);
        this.physics.add.collider(this.pickups, this.platforms);
        this.physics.add.overlap(this.carrots, this.enemyGroup, this.carrotHitEnemy, null, this);
        this.physics.add.overlap(this.player, this.pickups, this.collectPickup, null, this);
        this.physics.add.overlap(this.player, this.enemyGroup, this.playerTouchEnemy, null, this);

        // ---- Enemy HP bars ----
        this.enemyHpGraphics = this.add.graphics().setDepth(12);

        // ---- UI (fixed to camera) ----
        this.createUI();

        // ---- Input ----
        this.cursors = this.input.keyboard.createCursorKeys();
        this.spaceKey = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.SPACE);
        this.ctrlKey = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.CTRL);

        // Camera follow
        this.cameras.main.startFollow(this.player, false, 0.1, 0.1);

        // Level start overlay
        this.showLevelStart();
    }

    // --------------------------------------------------------
    // Background drawing
    // --------------------------------------------------------
    drawStaticBackground() {
        let g = this.bgGraphics;
        g.clear();
        let top = hexToNum(this.lvl.skyTop);
        let mid = hexToNum(this.lvl.skyMid);
        let bot = hexToNum(this.lvl.skyBot);
        // gradient sky - drawn across visible area (scrollFactor 0)
        for (let y = 0; y < H; y++) {
            let t = y / H;
            let c;
            if (t < 0.5) c = lerpColor(top, mid, t * 2);
            else c = lerpColor(mid, bot, (t - 0.5) * 2);
            g.fillStyle(c, 1);
            g.fillRect(0, y, W, 1);
        }
        g.setScrollFactor(0);
    }

    drawGround() {
        let g = this.groundGraphics;
        g.clear();
        let grassL = hexToNum(this.lvl.grassLight);
        let grassD = hexToNum(this.lvl.grassDark);
        let dirtL = hexToNum(this.lvl.dirtLight);
        let dirtD = hexToNum(this.lvl.dirtDark);
        let bushL = hexToNum(this.lvl.bushLight);
        let bushD = hexToNum(this.lvl.bushDark);
        let flA = hexToNum(this.lvl.flowerA);
        let flB = hexToNum(this.lvl.flowerB);

        let groundTop = GROUND_Y + SPRITE_SIZE - 4; // grass strip top

        // Dirt fill
        g.fillStyle(dirtL, 1);
        g.fillRect(0, groundTop + 6, this.levelWidth, H - groundTop);
        g.fillStyle(dirtD, 1);
        g.fillRect(0, groundTop + 20, this.levelWidth, H - groundTop - 14);

        // Grass strip
        g.fillStyle(grassL, 1);
        g.fillRect(0, groundTop, this.levelWidth, 6);
        g.fillStyle(grassD, 1);
        g.fillRect(0, groundTop + 3, this.levelWidth, 3);

        // Grass tufts
        let rng = seededRandom(this.currentLevel * 500 + 3);
        for (let x = 0; x < this.levelWidth; x += 12 + Math.floor(rng() * 20)) {
            let tuftH = 3 + Math.floor(rng() * 5);
            g.fillStyle(rng() > 0.5 ? grassL : grassD, 1);
            g.fillRect(x, groundTop - tuftH, 3, tuftH);
        }

        // Flowers
        for (let x = 0; x < this.levelWidth; x += 40 + Math.floor(rng() * 80)) {
            let fc = rng() > 0.5 ? flA : flB;
            g.fillStyle(fc, 1);
            g.fillRect(x, groundTop - 4, 4, 4);
            g.fillStyle(0x44aa44, 1);
            g.fillRect(x + 1, groundTop - 1, 2, 3);
        }

        // Bushes
        for (let i = 0; i < 60; i++) {
            let bx = rng() * this.levelWidth;
            let bw = 20 + rng() * 30;
            let bh = 12 + rng() * 16;
            g.fillStyle(rng() > 0.5 ? bushL : bushD, 1);
            g.fillRoundedRect(bx, groundTop - bh, bw, bh, 4);
        }
    }

    drawPlatforms() {
        let g = this.platformGraphics;
        g.clear();
        let grassL = hexToNum(this.lvl.grassLight);
        let grassD = hexToNum(this.lvl.grassDark);
        let dirtL = hexToNum(this.lvl.dirtLight);

        for (let p of this.platformData) {
            // Dirt body
            g.fillStyle(dirtL, 1);
            g.fillRect(p.x, p.y + 4, p.w, p.h - 4);
            // Grass top
            g.fillStyle(grassL, 1);
            g.fillRect(p.x, p.y, p.w, 4);
            g.fillStyle(grassD, 1);
            g.fillRect(p.x, p.y + 2, p.w, 2);
            // Grass tufts on top
            for (let tx = p.x; tx < p.x + p.w; tx += 8 + Math.floor(Math.random() * 10)) {
                g.fillStyle(grassL, 1);
                g.fillRect(tx, p.y - 2, 2, 3);
            }
        }
    }

    drawGoalPost() {
        let g = this.goalGraphics;
        g.clear();
        let gx = this.GOAL_X;
        // Pole
        g.fillStyle(0xcccccc, 1);
        g.fillRect(gx, GROUND_Y - 20, 6, SPRITE_SIZE + 24);
        // Flag
        g.fillStyle(0x44ff44, 1);
        g.fillRect(gx + 6, GROUND_Y - 20, 40, 20);
        // GOAL text via graphics (simple)
        g.fillStyle(0xffffff, 1);
        g.fillRect(gx + 10, GROUND_Y - 16, 4, 12); // G
        g.fillRect(gx + 10, GROUND_Y - 16, 12, 3);
        g.fillRect(gx + 10, GROUND_Y - 7, 12, 3);
        g.fillRect(gx + 19, GROUND_Y - 10, 3, 6);
    }

    generatePlatforms(levelIndex) {
        let rng = seededRandom(levelIndex * 777 + 42);
        let count = 24;
        let lw = this.levelWidth;

        for (let i = 0; i < count; i++) {
            let px = 200 + (i / count) * (lw - 600) + (rng() - 0.5) * 100;
            let py = 210 + rng() * 170; // Y between 210-380
            let pw = 96 + Math.floor(rng() * 96);
            let ph = 16;

            px = Math.max(100, Math.min(lw - 200, px));

            this.platformData.push({ x: px, y: py, w: pw, h: ph });

            // Create physics body for the platform
            let plat = this.add.zone(px + pw/2, py + ph/2, pw, ph);
            this.physics.add.existing(plat, true); // static
            this.platforms.add(plat);
        }
    }

    // --------------------------------------------------------
    // Player
    // --------------------------------------------------------
    createPlayer() {
        this.player = this.physics.add.sprite(80, GROUND_Y - 10, 'sprites', 'FARMER_SPRITE');
        this.player.setScale(S);
        this.player.setOrigin(0.5, 1); // anchor at bottom center
        this.player.body.setSize(13, 16); // tighter hitbox in sprite-pixels
        this.player.body.setOffset(1.5, 0);
        this.player.setCollideWorldBounds(true);
        this.player.setDepth(10);

        this.playerHP = 5;
        this.playerMaxHP = 5;
        this.ammo = 30;
        this.maxAmmo = 99;
    }

    // --------------------------------------------------------
    // Enemies
    // --------------------------------------------------------
    spawnEnemies(levelIndex) {
        let lvl = LEVELS[levelIndex];
        let lw = lvl.levelWidth;
        let speedBase = 1 + levelIndex * 0.25;
        let ec = lvl.enemies;

        // Ground enemies
        let groundEnemies = [];
        for (let i = 0; i < ec.bunny; i++) groundEnemies.push('bunny');
        for (let i = 0; i < ec.tortoise; i++) groundEnemies.push('tortoise');
        for (let i = 0; i < ec.fox; i++) groundEnemies.push('fox');

        // Shuffle
        for (let i = groundEnemies.length - 1; i > 0; i--) {
            let j = Math.floor(Math.random() * (i + 1));
            [groundEnemies[i], groundEnemies[j]] = [groundEnemies[j], groundEnemies[i]];
        }

        // Spread across level
        let spacing = (lw - 800) / (groundEnemies.length + 1);
        for (let i = 0; i < groundEnemies.length; i++) {
            let ex = 300 + spacing * (i + 1) + (Math.random() - 0.5) * 60;
            let ey = GROUND_Y + SPRITE_SIZE - 4; // stand on ground
            let speedMult = speedBase * (1 + (ex / lw) * 0.6);
            this.spawnEnemy(groundEnemies[i], ex, ey, speedMult, false);
        }

        // Platform enemies
        let platEnemies = [];
        for (let i = 0; i < ec.platBunny; i++) platEnemies.push('bunny');
        for (let i = 0; i < ec.platTort; i++) platEnemies.push('tortoise');

        // Place on random platforms
        let platCopy = [...this.platformData];
        for (let i = platCopy.length - 1; i > 0; i--) {
            let j = Math.floor(Math.random() * (i + 1));
            [platCopy[i], platCopy[j]] = [platCopy[j], platCopy[i]];
        }
        for (let i = 0; i < platEnemies.length && i < platCopy.length; i++) {
            let p = platCopy[i];
            let ex = p.x + p.w / 2;
            let ey = p.y - 10; // slightly above platform, gravity settles them
            let speedMult = speedBase * (1 + (ex / lw) * 0.6);
            this.spawnEnemy(platEnemies[i], ex, ey, speedMult, true, p);
        }

        // Crows
        for (let i = 0; i < ec.crow; i++) {
            let ex = 400 + Math.random() * (lw - 900);
            let ey = 80 + Math.random() * 150;
            let speedMult = speedBase * (1 + (ex / lw) * 0.6);
            this.spawnEnemy('crow', ex, ey, speedMult, false);
        }
    }

    spawnEnemy(type, x, y, speedMult, onPlatform, platform) {
        let frameKey;
        let hp, pts, ammoDrop;
        switch (type) {
            case 'bunny':
                frameKey = 'BUNNY_SPRITE'; hp = 1; pts = 10; ammoDrop = 1; break;
            case 'tortoise':
                frameKey = 'TORTOISE_SPRITE'; hp = 2; pts = 20; ammoDrop = 3; break;
            case 'fox':
                frameKey = 'FOX_SPRITE'; hp = 1; pts = 15; ammoDrop = 2; break;
            case 'crow':
                frameKey = 'CROW_SPRITE'; hp = 1; pts = 15; ammoDrop = 2; break;
        }

        // Place ground enemies above ground so they fall onto it via gravity
        let spawnY = y;
        if (type !== 'crow' && !onPlatform) {
            spawnY = GROUND_Y; // above ground, gravity brings them down
        }

        let enemy = this.physics.add.sprite(x, spawnY, 'sprites', frameKey);
        enemy.setScale(S);
        enemy.setOrigin(0.5, 1);
        enemy.setDepth(8);

        if (type === 'crow') {
            enemy.body.allowGravity = false;
        } else {
            enemy.body.allowGravity = true;
        }
        enemy.body.immovable = false;
        enemy.body.setSize(12, 14);
        enemy.body.setOffset(2, 2);

        let data = {
            sprite: enemy,
            type: type,
            hp: hp,
            maxHp: hp,
            pts: pts,
            ammoDrop: ammoDrop,
            spawnX: x,
            spawnY: y,
            speedMult: speedMult,
            onPlatform: onPlatform,
            platform: platform || null,
            state: 'IDLE',
            stateTimer: 60 + Math.floor(Math.random() * 60),
            animTimer: 0,
            // crow-specific
            sinePhase: Math.random() * Math.PI * 2,
            circleAngle: 0,
            swoopTargetY: 0,
            swooping: false
        };

        this.enemyGroup.add(enemy);
        this.enemyData.push(data);
        enemy._enemyData = data;

        return data;
    }

    // --------------------------------------------------------
    // UI
    // --------------------------------------------------------
    createUI() {
        let uiDepth = 100;

        // Top bar background
        this.uiBarBg = this.add.graphics();
        this.uiBarBg.fillStyle(0x000000, 0.5);
        this.uiBarBg.fillRect(0, 0, W, 28);
        this.uiBarBg.setScrollFactor(0).setDepth(uiDepth);

        this.scoreText = this.add.text(10, 6, 'SCORE 0', {
            fontFamily: FONT, fontSize: '11px', color: '#ffd866'
        }).setScrollFactor(0).setDepth(uiDepth + 1);

        this.ammoText = this.add.text(W/2, 6, 'AMMO 30', {
            fontFamily: FONT, fontSize: '11px', color: '#ffd866'
        }).setOrigin(0.5, 0).setScrollFactor(0).setDepth(uiDepth + 1);

        this.bestText = this.add.text(W - 10, 6, 'BEST ' + this.hiScore, {
            fontFamily: FONT, fontSize: '11px', color: '#8ba898'
        }).setOrigin(1, 0).setScrollFactor(0).setDepth(uiDepth + 1);

        // Hearts
        this.hearts = [];
        for (let i = 0; i < 5; i++) {
            let h = this.add.image(14 + i * 28, 42, 'sprites', 'HEART').setScale(3);
            h.setScrollFactor(0).setDepth(uiDepth + 1);
            this.hearts.push(h);
        }

        // Progress bar
        this.progressBg = this.add.graphics();
        this.progressBg.fillStyle(0x333333, 0.6);
        this.progressBg.fillRect(200, 30, W - 400, 4);
        this.progressBg.setScrollFactor(0).setDepth(uiDepth);

        this.progressBar = this.add.graphics();
        this.progressBar.setScrollFactor(0).setDepth(uiDepth + 1);

        // Level indicator
        this.lvlText = this.add.text(W - 10, 38, 'LVL ' + (this.currentLevel + 1) + '/6', {
            fontFamily: FONT, fontSize: '8px', color: '#8ba898'
        }).setOrigin(1, 0).setScrollFactor(0).setDepth(uiDepth + 1);

        // Boss HUD (hidden initially)
        this.bossHudBg = this.add.graphics();
        this.bossHudBg.setScrollFactor(0).setDepth(uiDepth).setVisible(false);
        this.bossNameText = this.add.text(W/2, H - 46, '', {
            fontFamily: FONT, fontSize: '10px', color: '#ff4444'
        }).setOrigin(0.5).setScrollFactor(0).setDepth(uiDepth + 1).setVisible(false);
        this.bossHpBar = this.add.graphics();
        this.bossHpBar.setScrollFactor(0).setDepth(uiDepth + 1).setVisible(false);
    }

    updateUI() {
        this.scoreText.setText('SCORE ' + this.score);
        this.ammoText.setText('AMMO ' + this.ammo);
        if (this.score > this.hiScore) {
            this.hiScore = this.score;
        }
        this.bestText.setText('BEST ' + this.hiScore);

        // Hearts
        for (let i = 0; i < 5; i++) {
            this.hearts[i].setFrame(i < this.playerHP ? 'HEART' : 'HEART_EMPTY');
        }

        // Progress bar
        this.progressBar.clear();
        let prog = Math.min(1, this.player.x / this.GOAL_X);
        this.progressBar.fillStyle(0x44ff44, 0.8);
        this.progressBar.fillRect(200, 30, (W - 400) * prog, 4);

        // Boss HUD
        if (this.boss && !this.bossDead) {
            this.bossHudBg.setVisible(true);
            this.bossNameText.setVisible(true);
            this.bossHpBar.setVisible(true);

            this.bossHudBg.clear();
            this.bossHudBg.fillStyle(0x000000, 0.6);
            this.bossHudBg.fillRect(W/2 - 150, H - 56, 300, 30);

            this.bossNameText.setText('\u2620 ' + this.lvl.boss.name);

            this.bossHpBar.clear();
            let bossHpFrac = this.boss.hp / this.boss.maxHp;
            this.bossHpBar.fillStyle(0x440000, 1);
            this.bossHpBar.fillRect(W/2 - 120, H - 36, 240, 8);
            this.bossHpBar.fillStyle(bossHpFrac > 0.5 ? 0xff2222 : 0xff6600, 1);
            this.bossHpBar.fillRect(W/2 - 120, H - 36, 240 * bossHpFrac, 8);
        } else {
            this.bossHudBg.setVisible(false);
            this.bossNameText.setVisible(false);
            this.bossHpBar.setVisible(false);
        }
    }

    // --------------------------------------------------------
    // Level start overlay
    // --------------------------------------------------------
    showLevelStart() {
        let overlay = this.add.graphics();
        overlay.fillStyle(0x000000, 0.7);
        overlay.fillRect(0, 0, W, H);
        overlay.setScrollFactor(0).setDepth(200);

        let t1 = this.add.text(W/2, H/2 - 30, 'LEVEL ' + (this.currentLevel + 1), {
            fontFamily: FONT, fontSize: '24px', color: '#ffd866'
        }).setOrigin(0.5).setScrollFactor(0).setDepth(201);

        let t2 = this.add.text(W/2, H/2 + 10, this.lvl.name, {
            fontFamily: FONT, fontSize: '14px', color: '#8ba898'
        }).setOrigin(0.5).setScrollFactor(0).setDepth(201);

        this.overlayShown = true;

        this.time.delayedCall(1500, () => {
            overlay.destroy();
            t1.destroy();
            t2.destroy();
            this.overlayShown = false;
        });
    }

    // --------------------------------------------------------
    // Main update loop
    // --------------------------------------------------------
    update(time, delta) {
        if (this.overlayShown) return;
        if (this.gameOver || this.levelComplete || this.victory) {
            if (Phaser.Input.Keyboard.JustDown(this.spaceKey)) {
                if (this.gameOver) {
                    this.score = 0;
                    this.startLevel(0);
                } else if (this.levelComplete) {
                    this.startLevel(this.currentLevel + 1);
                } else if (this.victory) {
                    this.scene.start('MenuScene');
                }
            }
            return;
        }

        this.frameCount++;

        // Passive score
        if (this.frameCount % 10 === 0) this.score++;

        this.updatePlayer(time, delta);
        this.updateEnemies(time, delta);
        this.updateCarrots();
        this.updateBreakableBlocks();
        this.updateBoss(time, delta);
        this.updateBossProjectiles(delta);
        this.updateDamageZones(delta);
        this.updatePickups();
        this.updateStars();
        this.updateClouds(delta);
        this.updateUI();
        this.checkBossSpawn();
        this.checkGoal();
        this.updateInvincibility(delta);
    }

    // --------------------------------------------------------
    // Player update
    // --------------------------------------------------------
    updatePlayer(time, delta) {
        let p = this.player;
        let onGround = p.body.blocked.down;
        let moving = false;
        this.isCrouching = false;
        let shootCooldown = this.activePowerups.rapid_fire ? SHOOT_COOLDOWN * 0.4 : SHOOT_COOLDOWN;

        // Reset velocity
        p.setVelocityX(0);

        // Crouch (DOWN arrow or CTRL key while on ground)
        let crouchInput = (this.cursors.down.isDown || this.ctrlKey.isDown) && onGround;
        if (crouchInput) {
            this.isCrouching = true;
            p.setFrame('FARMER_CROUCH');
            p.body.setSize(13, 10);
            p.body.setOffset(1.5, 6);
            // Allow slow movement while crouching
            let crouchSpeed = (this.activePowerups.speed_boost ? MOVE_SPEED * 1.5 : MOVE_SPEED) * 0.4;
            if (this.cursors.left.isDown) {
                p.setVelocityX(-crouchSpeed);
                this.facingRight = false;
                p.setFlipX(true);
                moving = true;
            } else if (this.cursors.right.isDown) {
                p.setVelocityX(crouchSpeed);
                this.facingRight = true;
                p.setFlipX(false);
                moving = true;
            }
            // Allow shooting while crouching
            if (this.spaceKey.isDown && this.ammo > 0) {
                if (time > this.shootTimer) {
                    this.shootTimer = time + shootCooldown;
                    this.ammo--;
                    this.shootCarrot();
                }
            }
            // Landing dust
            if (onGround && this.wasInAir) this.spawnLandingDust(p.x, p.y);
            this.wasInAir = false;
            return; // no jump while crouching
        } else {
            p.body.setSize(13, 16);
            p.body.setOffset(1.5, 0);
        }

        // Movement
        let moveSpeed = this.activePowerups.speed_boost ? MOVE_SPEED * 1.5 : MOVE_SPEED;
        if (this.cursors.left.isDown) {
            p.setVelocityX(-moveSpeed);
            this.facingRight = false;
            p.setFlipX(true);
            moving = true;
        } else if (this.cursors.right.isDown) {
            p.setVelocityX(moveSpeed);
            this.facingRight = true;
            p.setFlipX(false);
            moving = true;
        }

        // Jump
        if (this.cursors.up.isDown && onGround) {
            p.setVelocityY(JUMP_VEL);
        }

        // Frame selection
        if (!onGround) {
            p.setFrame('FARMER_JUMP');
        } else if (moving) {
            this.walkAnimTimer++;
            if (this.walkAnimTimer >= 8) {
                this.walkAnimTimer = 0;
                this.walkFrame = 1 - this.walkFrame;
            }
            p.setFrame(this.walkFrame === 0 ? 'FARMER_SPRITE' : 'FARMER_WALK');
        } else {
            p.setFrame('FARMER_SPRITE');
            this.walkAnimTimer = 0;
            this.walkFrame = 0;
        }

        // Landing dust
        if (onGround && this.wasInAir) {
            this.spawnLandingDust(p.x, p.y);
        }
        this.wasInAir = !onGround;

        // Shoot
        if (this.spaceKey.isDown) {
            if (time > this.shootTimer && this.ammo > 0) {
                this.shootTimer = time + shootCooldown;
                this.ammo--;
                this.shootCarrot();
            }
        }
    }

    shootCarrot() {
        let dir = this.facingRight ? 1 : -1;
        if (this.activePowerups.spread_shot) {
            // Fire 3 carrots in a spread
            let angles = [-0.22, 0, 0.22];
            for (let angle of angles) {
                this.spawnSingleCarrot(dir, angle);
            }
        } else {
            this.spawnSingleCarrot(dir, 0);
        }
    }

    spawnSingleCarrot(dir, angle) {
        let cx = this.player.x + dir * 30;
        let cy = this.player.y - SPRITE_SIZE / 2;
        let isBig = this.activePowerups.big_carrot;
        let scale = isBig ? S * 1.6 : S;

        let carrot = this.physics.add.sprite(cx, cy, 'sprites', 'CARROT_SPRITE');
        carrot.setScale(scale);
        carrot.setDepth(9);
        carrot.setFlipX(dir < 0);
        carrot._isBig = isBig || false;
        this.carrots.add(carrot);
        carrot.body.allowGravity = false;
        carrot.setVelocityX(dir * CARROT_SPEED * Math.cos(angle));
        carrot.setVelocityY(Math.sin(angle) * CARROT_SPEED);

        this.time.delayedCall(2000, () => {
            if (carrot && carrot.active) carrot.destroy();
        });
    }

    updateCarrots() {
        this.carrots.getChildren().forEach(c => {
            if (c.x < this.cameras.main.scrollX - 100 || c.x > this.cameras.main.scrollX + W + 100) {
                c.destroy();
            }
        });
    }

    // --------------------------------------------------------
    // Enemy update
    // --------------------------------------------------------
    updateEnemies(time, delta) {
        for (let i = this.enemyData.length - 1; i >= 0; i--) {
            let ed = this.enemyData[i];
            if (!ed.sprite.active) continue;

            ed.stateTimer--;
            ed.animTimer++;

            if (ed.stateTimer <= 0) {
                this.rerollEnemyState(ed);
            }

            switch (ed.type) {
                case 'bunny': this.updateBunny(ed); break;
                case 'tortoise': this.updateTortoise(ed); break;
                case 'fox': this.updateFox(ed); break;
                case 'crow': this.updateCrow(ed); break;
            }
        }

        // Draw HP bars for multi-HP enemies
        this.enemyHpGraphics.clear();
        for (let ed of this.enemyData) {
            if (!ed.sprite.active) continue;
            if (ed.maxHp > 1 && ed.hp > 0) {
                let bx = ed.sprite.x - 16;
                let by = ed.sprite.y - SPRITE_SIZE - 8;
                let bw = 32;
                this.enemyHpGraphics.fillStyle(0x440000, 1);
                this.enemyHpGraphics.fillRect(bx, by, bw, 4);
                this.enemyHpGraphics.fillStyle(0xff4444, 1);
                this.enemyHpGraphics.fillRect(bx, by, bw * (ed.hp / ed.maxHp), 4);
            }
        }
    }

    rerollEnemyState(ed) {
        let px = this.player.x;
        let dist = Math.abs(px - ed.sprite.x);

        switch (ed.type) {
            case 'bunny': {
                let states = ['IDLE', 'HOP_TOWARD', 'HOP_AWAY'];
                // More aggressive: less idle, more active pursuit
                let weights = [25, 50, 25];
                if (dist < 120) weights = [15, 20, 65]; // retreat when close
                if (dist > 400) weights = [10, 75, 15]; // charge when far
                ed.state = states[weightedPick(weights)];
                ed.stateTimer = 60 + Math.floor(Math.random() * 60);
                break;
            }
            case 'tortoise': {
                let states = ['PATROL', 'TRACK', 'STOP_AND_GO'];
                let weights = [25, 45, 30]; // more tracking
                if (dist < 280) weights = [10, 65, 25]; // aggressively track when near
                ed.state = states[weightedPick(weights)];
                ed.stateTimer = 90 + Math.floor(Math.random() * 60);
                break;
            }
            case 'fox': {
                let states = ['PATROL', 'STALK', 'FEINT', 'ZIGZAG_CHARGE', 'LEAP'];
                let weights = [15, 20, 20, 25, 20]; // more aggressive mix
                if (dist < 200) weights = [5, 10, 25, 35, 25]; // very aggressive when near
                if (dist > 350) weights = [10, 30, 15, 25, 20];
                ed.state = states[weightedPick(weights)];
                ed.stateTimer = 70 + Math.floor(Math.random() * 50);
                ed.chargeSpeedMult = 0.8 + Math.random() * 0.7;
                break;
            }
            case 'crow': {
                let states = ['SINE_PATROL', 'SWOOP_DIVE', 'CIRCLE'];
                let weights = [25, 45, 30]; // more swooping
                ed.state = states[weightedPick(weights)];
                ed.stateTimer = 100 + Math.floor(Math.random() * 80);
                ed.swooping = false;
                ed.circleAngle = Math.random() * Math.PI * 2;
                break;
            }
        }
    }

    updateBunny(ed) {
        let s = ed.sprite;
        let speed = 0.3 * ed.speedMult * 60; // px/sec
        let px = this.player.x;

        // Animation
        if (ed.animTimer % 30 < 15) {
            s.setFrame('BUNNY_SPRITE');
        } else {
            s.setFrame('BUNNY_HOP');
        }

        switch (ed.state) {
            case 'IDLE':
                s.setVelocityX(0);
                break;
            case 'HOP_TOWARD': {
                let dir = px > s.x ? 1 : -1;
                s.setVelocityX(dir * speed);
                s.setFlipX(dir < 0);
                break;
            }
            case 'HOP_AWAY': {
                let dir = px > s.x ? -1 : 1;
                s.setVelocityX(dir * speed);
                s.setFlipX(dir < 0);
                break;
            }
        }

        // Keep on ground or platform
        this.constrainToSurface(ed);
    }

    updateTortoise(ed) {
        let s = ed.sprite;
        let baseSpeed = 0.5 * ed.speedMult * 60;
        let px = this.player.x;

        // Shell retreat
        if (ed.state === 'SHELL_RETREAT') {
            s.setVelocityX(0);
            s.setAlpha(0.6);
            if (ed.stateTimer <= 0) {
                s.setAlpha(1);
                this.rerollEnemyState(ed);
            }
            this.constrainToSurface(ed);
            return;
        }

        s.setAlpha(1);

        switch (ed.state) {
            case 'PATROL': {
                let range = 120;
                let offset = Math.sin(ed.animTimer * 0.02) * range;
                let targetX = ed.spawnX + offset;
                let dir = targetX > s.x ? 1 : -1;
                s.setVelocityX(dir * baseSpeed * 0.5);
                s.setFlipX(dir < 0);
                break;
            }
            case 'TRACK': {
                let dist = Math.abs(px - s.x);
                if (dist < 280) {
                    let dir = px > s.x ? 1 : -1;
                    s.setVelocityX(dir * baseSpeed);
                    s.setFlipX(dir < 0);
                }
                break;
            }
            case 'STOP_AND_GO': {
                if (ed.animTimer % 60 < 30) {
                    let dir = px > s.x ? 1 : -1;
                    s.setVelocityX(dir * baseSpeed * 0.4);
                    s.setFlipX(dir < 0);
                } else {
                    s.setVelocityX(0);
                }
                break;
            }
        }

        this.constrainToSurface(ed);
    }

    updateFox(ed) {
        let s = ed.sprite;
        let baseSpeed = ed.speedMult * 60;
        let px = this.player.x;
        let dist = Math.abs(px - s.x);
        let dir = px > s.x ? 1 : -1;

        switch (ed.state) {
            case 'PATROL': {
                let offset = Math.sin(ed.animTimer * 0.03) * 80;
                let targetX = ed.spawnX + offset;
                let d = targetX > s.x ? 1 : -1;
                s.setVelocityX(d * baseSpeed * 0.4);
                s.setFlipX(d < 0);
                break;
            }
            case 'STALK': {
                if (ed.animTimer % 40 < 25) {
                    s.setVelocityX(dir * baseSpeed * 0.4);
                } else {
                    s.setVelocityX(0);
                }
                s.setFlipX(dir < 0);
                break;
            }
            case 'FEINT': {
                // Rush toward then stop then rush again
                let phase = ed.stateTimer % 60;
                if (phase > 40) {
                    s.setVelocityX(dir * baseSpeed * ed.chargeSpeedMult);
                } else if (phase > 30) {
                    s.setVelocityX(0);
                } else {
                    s.setVelocityX(dir * baseSpeed * ed.chargeSpeedMult * 1.2);
                }
                s.setFlipX(dir < 0);
                break;
            }
            case 'ZIGZAG_CHARGE': {
                s.setVelocityX(dir * baseSpeed * ed.chargeSpeedMult);
                // Small vertical hops
                if (ed.animTimer % 20 === 0) {
                    s.y -= 8;
                }
                s.setFlipX(dir < 0);
                break;
            }
            case 'LEAP': {
                if (dist < 150) {
                    s.setVelocityX(dir * baseSpeed * 1.5);
                    if (ed.animTimer % 30 === 0) {
                        s.y -= 20;
                    }
                } else {
                    s.setVelocityX(dir * baseSpeed * 0.5);
                }
                s.setFlipX(dir < 0);
                break;
            }
        }

        this.constrainToSurface(ed);
    }

    updateCrow(ed) {
        let s = ed.sprite;
        let baseSpeed = ed.speedMult * 60;
        let px = this.player.x;
        let py = this.player.y;

        // Wing flap animation
        if (ed.animTimer % 20 < 10) {
            s.setFrame('CROW_SPRITE');
        } else {
            s.setFrame('CROW_FLAP');
        }

        switch (ed.state) {
            case 'SINE_PATROL': {
                ed.sinePhase += 0.03;
                let offsetX = Math.sin(ed.sinePhase) * 250;
                let offsetY = Math.cos(ed.sinePhase * 0.7) * 40;
                let targetX = ed.spawnX + offsetX;
                let targetY = ed.spawnY + offsetY;
                s.x += (targetX - s.x) * 0.02;
                s.y += (targetY - s.y) * 0.02;
                s.setFlipX(Math.sin(ed.sinePhase) < 0);
                break;
            }
            case 'SWOOP_DIVE': {
                if (!ed.swooping) {
                    ed.swoopTargetY = GROUND_Y - 20;
                    ed.swooping = true;
                    ed.swoopPhase = 0;
                }
                ed.swoopPhase++;
                if (ed.swoopPhase < 40) {
                    // Dive down toward player
                    s.x += (px - s.x) * 0.03;
                    s.y += 4;
                    if (s.y > ed.swoopTargetY) s.y = ed.swoopTargetY;
                } else {
                    // Pull up
                    s.y -= 3;
                    if (s.y < ed.spawnY) {
                        s.y = ed.spawnY;
                        ed.swooping = false;
                        this.rerollEnemyState(ed);
                    }
                }
                s.setFlipX(px < s.x);
                break;
            }
            case 'CIRCLE': {
                ed.circleAngle += 0.04;
                let radius = 100;
                s.x = px + Math.cos(ed.circleAngle) * radius;
                s.y = py - 80 + Math.sin(ed.circleAngle) * 50;
                s.y = Math.max(30, Math.min(GROUND_Y - 30, s.y));
                s.setFlipX(Math.sin(ed.circleAngle) > 0);
                break;
            }
        }
    }

    constrainToSurface(ed) {
        let s = ed.sprite;
        if (ed.onPlatform && ed.platform) {
            // Keep on platform horizontally
            s.x = Math.max(ed.platform.x + 10, Math.min(ed.platform.x + ed.platform.w - 10, s.x));
        } else if (ed.type !== 'crow') {
            // Keep within level bounds horizontally
            s.x = Math.max(30, Math.min(this.levelWidth - 30, s.x));
        }
    }

    // --------------------------------------------------------
    // Collisions
    // --------------------------------------------------------
    carrotHitEnemy(carrot, enemySprite) {
        carrot.destroy();

        let ed = enemySprite._enemyData;
        if (!ed) return;

        ed.hp--;

        if (ed.type === 'tortoise' && ed.hp > 0) {
            ed.state = 'SHELL_RETREAT';
            ed.stateTimer = 60;
        }

        if (ed.hp <= 0) {
            this.killEnemy(ed);
        } else {
            // Flash
            enemySprite.setTint(0xff0000);
            this.time.delayedCall(100, () => {
                if (enemySprite.active) enemySprite.clearTint();
            });
        }
    }

    killEnemy(ed) {
        let s = ed.sprite;
        this.score += ed.pts;

        // Decrement boss minion count if this was a summoned minion
        if (ed._bossMinion && this.boss) {
            this.boss.minionCount = Math.max(0, this.boss.minionCount - 1);
        }

        // Poof particles
        this.spawnPoofParticles(s.x, s.y - SPRITE_SIZE/2);
        // Score popup
        this.spawnScorePopup(s.x, s.y - SPRITE_SIZE, '+' + ed.pts);

        // Drop pickup
        this.spawnPickup(s.x, s.y - 20, ed);

        s.destroy();
    }

    playerTouchEnemy(player, enemySprite) {
        if (this.invincibleTimer > 0) return;
        this.takeDamage();
    }

    takeDamage() {
        if (this.invincibleTimer > 0) return;
        if (this.shieldActive) {
            this.shieldActive = false;
            this.invincibleTimer = 1500;
            this.spawnScorePopup(this.player.x, this.player.y - SPRITE_SIZE, 'BLOCKED!');
            return;
        }
        this.playerHP--;
        this.invincibleTimer = 1500; // 1.5 seconds (90 frames at 60fps)

        if (this.playerHP <= 0) {
            this.playerDeath();
        }
    }

    updateInvincibility(delta) {
        if (this.invincibleTimer > 0) {
            this.invincibleTimer -= delta;
            // Flash
            this.player.setAlpha(Math.sin(this.frameCount * 0.5) > 0 ? 1 : 0.3);
            if (this.invincibleTimer <= 0) {
                this.invincibleTimer = 0;
                this.player.setAlpha(1);
            }
        }
    }

    playerDeath() {
        this.gameOver = true;
        this.saveHiScore();

        // Death particles
        this.spawnDeathParticles(this.player.x, this.player.y - SPRITE_SIZE/2);
        this.player.setVisible(false);
        this.player.body.enable = false;

        // Overlay
        let overlay = this.add.graphics();
        overlay.fillStyle(0x000000, 0.7);
        overlay.fillRect(0, 0, W, H);
        overlay.setScrollFactor(0).setDepth(200);

        this.add.text(W/2, H/2 - 40, 'GAME OVER', {
            fontFamily: FONT, fontSize: '28px', color: '#ff4444'
        }).setOrigin(0.5).setScrollFactor(0).setDepth(201);

        this.add.text(W/2, H/2 + 10, 'SCORE: ' + this.score, {
            fontFamily: FONT, fontSize: '14px', color: '#ffd866'
        }).setOrigin(0.5).setScrollFactor(0).setDepth(201);

        this.add.text(W/2, H/2 + 50, 'PRESS SPACE TO RETRY', {
            fontFamily: FONT, fontSize: '10px', color: '#8ba898'
        }).setOrigin(0.5).setScrollFactor(0).setDepth(201);
    }

    // --------------------------------------------------------
    // Pickups
    // --------------------------------------------------------
    spawnPickup(x, y, ed) {
        let isHealth = Math.random() < 0.15;
        let pickup;

        if (isHealth) {
            pickup = this.physics.add.sprite(x, y - 20, 'sprites', 'HEART');
            pickup.setScale(3);
            pickup._pickupType = 'health';
            pickup._amount = 1;
        } else {
            pickup = this.physics.add.sprite(x, y - 20, 'sprites', 'CARROT_SPRITE');
            pickup.setScale(2);
            pickup._pickupType = 'ammo';
            pickup._amount = ed.ammoDrop;
        }

        // Let gravity pull it down onto the platform/ground naturally
        pickup.body.allowGravity = true;
        pickup.body.setGravityY(200);
        pickup.setBounce(0.2);
        pickup.setDepth(7);
        pickup._bobPhase = Math.random() * Math.PI * 2;
        this.pickups.add(pickup);

        // Auto-destroy after 12 seconds
        this.time.delayedCall(12000, () => {
            if (pickup && pickup.active) pickup.destroy();
        });
    }

    updatePickups() {
        this.pickups.getChildren().forEach(p => {
            if (!p.active) return;
            // Gentle pulse tint to make pickups visible
            p._bobPhase += 0.08;
            let alpha = 0.7 + Math.sin(p._bobPhase) * 0.3;
            p.setAlpha(alpha);
        });
    }

    collectPickup(player, pickup) {
        if (pickup._pickupType === 'health') {
            if (this.playerHP < this.playerMaxHP) {
                this.playerHP++;
                this.spawnScorePopup(pickup.x, pickup.y - 20, '+1 HP');
            }
        } else if (pickup._pickupType === 'powerup') {
            this.activatePowerup(pickup._powerupType);
        } else {
            this.ammo = Math.min(this.maxAmmo, this.ammo + pickup._amount);
            this.spawnScorePopup(pickup.x, pickup.y - 20, '+' + pickup._amount);
        }
        pickup.destroy();
    }

    activatePowerup(type) {
        let labels = {
            spread_shot: 'SPREAD SHOT!', rapid_fire: 'RAPID FIRE!',
            big_carrot: 'BIG CARROTS!', shield: 'SHIELD!', speed_boost: 'SPEED BOOST!'
        };
        if (type === 'shield') {
            this.shieldActive = true;
        } else {
            this.activePowerups[type] = true;
            if (this.powerupTimers[type]) this.powerupTimers[type].remove();
            this.powerupTimers[type] = this.time.delayedCall(10000, () => {
                delete this.activePowerups[type];
            });
        }
        this.spawnScorePopup(this.player.x, this.player.y - SPRITE_SIZE, labels[type] || type);
    }

    // --------------------------------------------------------
    // Boss system
    // --------------------------------------------------------
    checkBossSpawn() {
        if (this.bossSpawned || this.bossDead) return;
        if (this.player.x >= this.GOAL_X - 900) {
            this.bossSpawned = true;
            this.showBossWarning();
        }
    }

    showBossWarning() {
        this.bossWarningActive = true;
        let overlay = this.add.graphics();
        overlay.fillStyle(0x000000, 0.5);
        overlay.fillRect(0, 0, W, H);
        overlay.setScrollFactor(0).setDepth(150);

        let warning = this.add.text(W/2, H/2, 'BOSS INCOMING!', {
            fontFamily: FONT, fontSize: '24px', color: '#ff4444'
        }).setOrigin(0.5).setScrollFactor(0).setDepth(151);

        let bossName = this.add.text(W/2, H/2 + 40, this.lvl.boss.name, {
            fontFamily: FONT, fontSize: '14px', color: '#ffd866'
        }).setOrigin(0.5).setScrollFactor(0).setDepth(151);

        this.time.delayedCall(2000, () => {
            overlay.destroy();
            warning.destroy();
            bossName.destroy();
            this.bossWarningActive = false;
            this.spawnBoss();
        });
    }

    spawnBoss() {
        let bossConf = this.lvl.boss;
        let bx = this.GOAL_X - 400;
        let by = GROUND_Y + SPRITE_SIZE - 4;

        // Flying bosses
        let isFlying = (bossConf.type === 'storm_crow' || bossConf.type === 'fire_drake');
        if (isFlying) by = 150;

        // Ground bosses spawn above ground and use gravity
        if (!isFlying) by = GROUND_Y - 20;

        let sprite = this.physics.add.sprite(bx, by, 'sprites', bossConf.key);
        sprite.setScale(S);
        sprite.setOrigin(0.5, 1);
        sprite.body.allowGravity = !isFlying;
        sprite.body.setSize(20, 22);
        sprite.body.setOffset(2, 1);
        sprite.setDepth(9);

        // Ground bosses collide with ground and platforms
        if (!isFlying) {
            this.physics.add.collider(sprite, this.groundCollider);
            this.physics.add.collider(sprite, this.platforms);
        }

        this.boss = {
            sprite: sprite,
            type: bossConf.type,
            hp: bossConf.hp,
            maxHp: bossConf.hp,
            pts: bossConf.pts,
            name: bossConf.name,
            isFlying: isFlying,
            attackState: 'choosing',
            attackTimer: 60,
            currentAttack: -1,
            attackFrame: 0,
            startupFrames: 0,
            activeFrames: 0,
            recoveryFrames: 0,
            enraged: false,
            spawnX: bx,
            minX: this.GOAL_X - 900,
            maxX: this.GOAL_X - BOSS_SIZE - 20,
            minionCount: 0,
            // For specific boss mechanics
            savedX: bx,
            savedY: by,
            shieldRocks: [],
            damageZoneTimer: 0,
            visible: true
        };

        // Boss-carrot collision
        this.physics.add.overlap(this.carrots, sprite, this.carrotHitBoss, null, this);
        // Boss-player collision
        this.physics.add.overlap(this.player, sprite, this.playerTouchBoss, null, this);
    }

    carrotHitBoss(carrot, bossSprite) {
        if (!this.boss || this.boss.hp <= 0) return;
        // Shield rocks block
        if (this.boss.shieldRocks && this.boss.shieldRocks.length > 0) {
            carrot.destroy();
            return;
        }
        carrot.destroy();
        this.boss.hp--;
        bossSprite.setTint(0xff0000);
        this.time.delayedCall(100, () => {
            if (bossSprite.active) bossSprite.clearTint();
        });

        if (this.boss.hp <= this.boss.maxHp / 2 && !this.boss.enraged) {
            this.boss.enraged = true;
            bossSprite.setTint(0xff6600);
            this.time.delayedCall(500, () => {
                if (bossSprite.active) bossSprite.clearTint();
            });
        }

        if (this.boss.hp <= 0) {
            this.killBoss();
        }
    }

    playerTouchBoss(player, bossSprite) {
        if (!this.boss || this.boss.hp <= 0) return;
        this.takeDamage();
    }

    killBoss() {
        this.bossDead = true;
        this.score += this.boss.pts;

        // Celebration particles
        for (let i = 0; i < 5; i++) {
            this.time.delayedCall(i * 100, () => {
                this.spawnCelebrationParticles(
                    this.boss.sprite.x + (Math.random() - 0.5) * 80,
                    this.boss.sprite.y - BOSS_SIZE/2 + (Math.random() - 0.5) * 40
                );
            });
        }

        this.spawnScorePopup(this.boss.sprite.x, this.boss.sprite.y - BOSS_SIZE, '+' + this.boss.pts);

        // Clean up boss projectiles
        this.clearBossProjectiles();
        this.clearDamageZones();
        // Clean up shield rocks
        if (this.boss.shieldRocks) {
            this.boss.shieldRocks.forEach(r => { if (r && r.gfx) r.gfx.destroy(); });
            this.boss.shieldRocks = [];
        }

        this.boss.sprite.destroy();
        this.boss = null;

        // Reveal the goal post now that boss is defeated
        this.drawGoalPost();
        this.goalGraphics.setVisible(true);
        this.spawnScorePopup(this.GOAL_X, GROUND_Y - 60, 'REACH THE GOAL!');
    }

    // --------------------------------------------------------
    // Boss AI update
    // --------------------------------------------------------
    updateBoss(time, delta) {
        if (!this.boss || this.boss.hp <= 0 || this.bossWarningActive) return;

        let b = this.boss;
        let s = b.sprite;

        b.attackTimer--;

        // Face player
        s.setFlipX(this.player.x < s.x);

        switch (b.attackState) {
            case 'choosing':
                if (b.attackTimer <= 0) {
                    this.chooseBossAttack();
                }
                // Idle movement
                if (b.isFlying) {
                    s.y = b.savedY + Math.sin(this.frameCount * 0.03) * 20;
                }
                break;
            case 'startup':
                b.attackFrame++;
                if (b.attackFrame >= b.startupFrames) {
                    b.attackState = 'active';
                    b.attackFrame = 0;
                    this.executeBossAttack();
                }
                // Visual: flash during startup
                s.setAlpha(b.attackFrame % 6 < 3 ? 0.6 : 1);
                break;
            case 'active':
                b.attackFrame++;
                s.setAlpha(1);
                this.updateBossActiveAttack();
                if (b.attackFrame >= b.activeFrames) {
                    b.attackState = 'recovery';
                    b.attackFrame = 0;
                    // Safety: reset boss to saved position if still off-screen
                    if (s.y > H || s.y < -BOSS_SIZE) {
                        s.y = b.savedY || (b.isFlying ? 150 : GROUND_Y - 20);
                    }
                }
                break;
            case 'recovery':
                b.attackFrame++;
                s.setAlpha(1);
                if (b.attackFrame >= b.recoveryFrames) {
                    b.attackState = 'choosing';
                    b.attackTimer = 20 + Math.floor(Math.random() * 20);
                }
                break;
        }

        // Clamp position
        s.x = Math.max(b.minX, Math.min(b.maxX, s.x));
        if (b.isFlying) {
            s.y = Math.max(40, Math.min(GROUND_Y - 20, s.y));
        }
        // Clamp Y: don't let ground boss stay off-screen
        if (!b.isFlying && s.y > GROUND_Y + SPRITE_SIZE + 10) {
            s.y = GROUND_Y - 20;
        }

        // Update shield rocks
        if (b.shieldRocks && b.shieldRocks.length > 0) {
            b.shieldRocks.forEach((r, i) => {
                if (!r) return;
                r.angle += 0.05;
                r.gfx.setPosition(
                    s.x + Math.cos(r.angle) * 60,
                    s.y - BOSS_SIZE/2 + Math.sin(r.angle) * 60
                );
                r.life--;
                if (r.life <= 0) {
                    r.gfx.destroy();
                    b.shieldRocks[i] = null;
                }
            });
            b.shieldRocks = b.shieldRocks.filter(r => r !== null);
        }
    }

    chooseBossAttack() {
        let b = this.boss;
        let weights, attacks;

        switch (b.type) {
            case 'bunny_king':
                attacks = ['spread', 'homing', 'ground_pound', 'summon', 'hop', 'spiral'];
                weights = b.enraged ? [20, 15, 20, 15, 10, 20] : [25, 15, 15, 10, 20, 15];
                break;
            case 'golem':
                attacks = ['walk_slam', 'rock_rain', 'charge', 'ground_crack', 'rock_shield', 'rock_drop'];
                weights = b.enraged ? [20, 20, 15, 15, 15, 15] : [30, 20, 15, 15, 20, 0];
                break;
            case 'storm_crow':
                attacks = ['lightning', 'dive_bomb', 'tornado', 'chain_lightning', 'wind_gust', 'feather_barrage'];
                weights = b.enraged ? [20, 15, 15, 20, 10, 20] : [25, 15, 15, 15, 10, 20];
                break;
            case 'cave_worm':
                attacks = ['emerge_snap', 'acid_spit', 'tail_sweep', 'summon_grubs'];
                weights = b.enraged ? [25, 25, 25, 25] : [30, 25, 25, 20];
                break;
            case 'fire_drake':
                attacks = ['fireball_spray', 'flame_breath', 'dive_fire_trail', 'wing_buffet'];
                weights = b.enraged ? [25, 25, 25, 25] : [30, 20, 25, 25];
                break;
            case 'ruin_knight':
                attacks = ['sword_slash', 'shield_charge', 'summon_wolves', 'teleport_strike', 'magic_orb', 'spiral'];
                weights = b.enraged ? [15, 15, 12, 20, 18, 20] : [20, 18, 12, 18, 17, 15];
                break;
            default: return;
        }

        b.currentAttack = weightedPick(weights);
        b.currentAttackName = attacks[b.currentAttack];
        b.attackFrame = 0;

        // Set startup/active/recovery based on attack
        this.setupBossAttackTimings();

        b.attackState = b.startupFrames > 0 ? 'startup' : 'active';
        if (b.attackState === 'active') this.executeBossAttack();
    }

    setupBossAttackTimings() {
        let b = this.boss;
        let e = b.enraged;
        let name = b.currentAttackName;

        // Defaults
        b.startupFrames = 20;
        b.activeFrames = 10;
        b.recoveryFrames = e ? 50 : 80;

        switch (b.type) {
            case 'bunny_king':
                switch (name) {
                    case 'spread': b.startupFrames = 20; b.activeFrames = 10; b.recoveryFrames = e ? 50 : 80; break;
                    case 'homing': b.startupFrames = 15; b.activeFrames = 5; b.recoveryFrames = e ? 70 : 100; break;
                    case 'ground_pound': b.startupFrames = 40; b.activeFrames = 60; b.recoveryFrames = e ? 40 : 60; break;
                    case 'summon': b.startupFrames = 20; b.activeFrames = 10; b.recoveryFrames = e ? 80 : 120; break;
                    case 'hop': b.startupFrames = 10; b.activeFrames = 30; b.recoveryFrames = e ? 40 : 60; break;
                    case 'spiral': b.startupFrames = 15; b.activeFrames = 50; b.recoveryFrames = e ? 55 : 85; break;
                }
                break;
            case 'golem':
                switch (name) {
                    case 'walk_slam': b.startupFrames = 40; b.activeFrames = 60; b.recoveryFrames = e ? 70 : 100; break;
                    case 'rock_rain': b.startupFrames = 30; b.activeFrames = 20; b.recoveryFrames = e ? 50 : 80; break;
                    case 'charge': b.startupFrames = 40; b.activeFrames = 60; b.recoveryFrames = e ? 60 : 90; break;
                    case 'ground_crack': b.startupFrames = 20; b.activeFrames = 10; b.recoveryFrames = e ? 70 : 100; break;
                    case 'rock_shield': b.startupFrames = 15; b.activeFrames = 120; b.recoveryFrames = e ? 50 : 80; break;
                    case 'rock_drop': b.startupFrames = 15; b.activeFrames = 10; b.recoveryFrames = e ? 50 : 80; break;
                }
                break;
            case 'storm_crow':
                switch (name) {
                    case 'lightning': b.startupFrames = 20; b.activeFrames = 20; b.recoveryFrames = e ? 35 : 55; break;
                    case 'dive_bomb': b.startupFrames = 20; b.activeFrames = 50; b.recoveryFrames = e ? 45 : 65; break;
                    case 'tornado': b.startupFrames = 15; b.activeFrames = 10; b.recoveryFrames = e ? 50 : 70; break;
                    case 'chain_lightning': b.startupFrames = 20; b.activeFrames = 50; b.recoveryFrames = e ? 50 : 80; break;
                    case 'wind_gust': b.startupFrames = 10; b.activeFrames = 30; b.recoveryFrames = e ? 40 : 60; break;
                    case 'feather_barrage': b.startupFrames = 15; b.activeFrames = 10; b.recoveryFrames = e ? 30 : 50; break;
                }
                break;
            case 'cave_worm':
                switch (name) {
                    case 'emerge_snap': b.startupFrames = 60; b.activeFrames = 30; b.recoveryFrames = e ? 50 : 80; break;
                    case 'acid_spit': b.startupFrames = 20; b.activeFrames = 10; b.recoveryFrames = e ? 45 : 70; break;
                    case 'tail_sweep': b.startupFrames = 25; b.activeFrames = 15; b.recoveryFrames = e ? 50 : 80; break;
                    case 'summon_grubs': b.startupFrames = 30; b.activeFrames = 10; b.recoveryFrames = e ? 70 : 100; break;
                }
                break;
            case 'fire_drake':
                switch (name) {
                    case 'fireball_spray': b.startupFrames = 20; b.activeFrames = 15; b.recoveryFrames = e ? 40 : 60; break;
                    case 'flame_breath': b.startupFrames = 30; b.activeFrames = 90; b.recoveryFrames = e ? 50 : 70; break;
                    case 'dive_fire_trail': b.startupFrames = 25; b.activeFrames = 50; b.recoveryFrames = e ? 50 : 80; break;
                    case 'wing_buffet': b.startupFrames = 15; b.activeFrames = 10; b.recoveryFrames = e ? 30 : 50; break;
                }
                break;
            case 'ruin_knight':
                switch (name) {
                    case 'sword_slash': b.startupFrames = 15; b.activeFrames = 10; b.recoveryFrames = e ? 30 : 50; break;
                    case 'shield_charge': b.startupFrames = 30; b.activeFrames = 40; b.recoveryFrames = e ? 50 : 70; break;
                    case 'summon_wolves': b.startupFrames = 25; b.activeFrames = 10; b.recoveryFrames = e ? 70 : 100; break;
                    case 'teleport_strike': b.startupFrames = 40; b.activeFrames = 20; b.recoveryFrames = e ? 40 : 60; break;
                    case 'magic_orb': b.startupFrames = 20; b.activeFrames = 15; b.recoveryFrames = e ? 50 : 70; break;
                    case 'spiral': b.startupFrames = 20; b.activeFrames = 60; b.recoveryFrames = e ? 45 : 70; break;
                }
                break;
        }
    }

    executeBossAttack() {
        let b = this.boss;
        let s = b.sprite;
        let px = this.player.x;
        let py = this.player.y;
        let name = b.currentAttackName;

        switch (b.type) {
            case 'bunny_king':
                this.executeBunnyKingAttack(name, b, s, px, py);
                break;
            case 'golem':
                this.executeGolemAttack(name, b, s, px, py);
                break;
            case 'storm_crow':
                this.executeStormCrowAttack(name, b, s, px, py);
                break;
            case 'cave_worm':
                this.executeCaveWormAttack(name, b, s, px, py);
                break;
            case 'fire_drake':
                this.executeFireDrakeAttack(name, b, s, px, py);
                break;
            case 'ruin_knight':
                this.executeRuinKnightAttack(name, b, s, px, py);
                break;
        }
    }

    // --- Bunny King ---
    executeBunnyKingAttack(name, b, s, px, py) {
        let dir = px < s.x ? -1 : 1;
        switch (name) {
            case 'spread': {
                let count = b.enraged ? 5 : 3;
                let baseAngle = Math.atan2(py - s.y + BOSS_SIZE/2, px - s.x);
                let spread = 0.3;
                for (let i = 0; i < count; i++) {
                    let angle = baseAngle + (i - (count-1)/2) * spread;
                    this.spawnBossProjectile(s.x, s.y - BOSS_SIZE/2, Math.cos(angle) * 300, Math.sin(angle) * 300, 'carrot', 0xff8800);
                }
                break;
            }
            case 'homing': {
                this.spawnBossProjectile(s.x, s.y - BOSS_SIZE/2, dir * 180, 0, 'homing', 0xff4400, { turnRate: 0.02, life: 180 });
                break;
            }
            case 'ground_pound': {
                b.savedY = s.y;
                b._gpPhase = 'up';
                break;
            }
            case 'summon': {
                let count = b.enraged ? 3 : 2;
                if (b.minionCount >= 4) break;
                for (let i = 0; i < count && b.minionCount < 4; i++) {
                    let mx = s.x + (Math.random() - 0.5) * 200;
                    let ed = this.spawnEnemy('bunny', mx, GROUND_Y + SPRITE_SIZE - 4, 1.5, false);
                    b.minionCount++;
                    // Track minion death to decrement count
                    ed._bossMinion = true;
                }
                break;
            }
            case 'hop': {
                s.setVelocityY(-300);
                this.time.delayedCall(500, () => {
                    if (s.active) s.setVelocityY(0);
                });
                break;
            }
            case 'spiral': {
                b._spiralAngle = 0;
                break;
            }
        }
    }

    // --- Stone Golem ---
    executeGolemAttack(name, b, s, px, py) {
        let dir = px < s.x ? -1 : 1;
        switch (name) {
            case 'walk_slam': {
                let walkSpeed = b.enraged ? 84 : 48;
                b._walkDir = dir;
                b._walkSpeed = walkSpeed;
                break;
            }
            case 'rock_rain': {
                let count = 5 + Math.floor(Math.random() * 4);
                for (let i = 0; i < count; i++) {
                    let rx = b.minX + Math.random() * (b.maxX - b.minX);
                    this.time.delayedCall(i * 100, () => {
                        this.spawnBossProjectile(rx, -20, 0, 400, 'rock', 0x888888);
                    });
                }
                break;
            }
            case 'charge': {
                b._chargeDir = dir;
                break;
            }
            case 'ground_crack': {
                this.damageZones.push({
                    x: s.x - 100, y: GROUND_Y + SPRITE_SIZE - 8,
                    w: 200, h: 16,
                    life: 300,
                    color: 0xff2200,
                    gfx: null
                });
                break;
            }
            case 'rock_shield': {
                for (let i = 0; i < 4; i++) {
                    let rg = this.add.graphics();
                    rg.fillStyle(0x888888, 1);
                    rg.fillCircle(0, 0, 10);
                    rg.setDepth(11);
                    b.shieldRocks.push({
                        gfx: rg,
                        angle: (Math.PI * 2 / 4) * i,
                        life: 120
                    });
                }
                break;
            }
            case 'rock_drop': {
                this.spawnBossProjectile(px, -30, 0, 500, 'rock', 0xaa6644);
                break;
            }
        }
    }

    // --- Storm Lord ---
    executeStormCrowAttack(name, b, s, px, py) {
        switch (name) {
            case 'lightning': {
                // Warning line then bolt
                let lx = px;
                let warning = this.add.graphics();
                warning.lineStyle(2, 0xffff00, 0.4);
                warning.lineBetween(lx, 0, lx, GROUND_Y + SPRITE_SIZE);
                warning.setDepth(12);
                this.time.delayedCall(333, () => {
                    warning.destroy();
                    this.spawnLightningBolt(lx);
                });
                break;
            }
            case 'dive_bomb': {
                b._divePhase = 'down';
                b.savedY = s.y;
                b._diveSpeed = b.enraged ? 840 : 600;
                break;
            }
            case 'tornado': {
                let dir = px < s.x ? -1 : 1;
                this.spawnBossProjectile(s.x, s.y, dir * 180, 0, 'tornado', 0x8888ff, { amplitude: 80, sinePhase: 0 });
                break;
            }
            case 'chain_lightning': {
                let positions = [px, px + 100, px - 100];
                positions.forEach((lx, i) => {
                    this.time.delayedCall(i * 250, () => {
                        this.spawnLightningBolt(lx);
                    });
                });
                break;
            }
            case 'wind_gust': {
                let dir = px < s.x ? -1 : 1;
                b._windDir = dir;
                b._windForce = 200 / 30; // spread over 30 frames
                break;
            }
            case 'feather_barrage': {
                let count = 8 + Math.floor(Math.random() * 5);
                let baseAngle = Math.atan2(py - s.y, px - s.x);
                for (let i = 0; i < count; i++) {
                    let angle = baseAngle + (Math.random() - 0.5) * 0.8;
                    let speed = 350 + Math.random() * 150;
                    this.spawnBossProjectile(s.x, s.y, Math.cos(angle) * speed, Math.sin(angle) * speed, 'feather', 0xcccccc);
                }
                break;
            }
        }
    }

    // --- Cave Worm ---
    executeCaveWormAttack(name, b, s, px, py) {
        switch (name) {
            case 'emerge_snap': {
                b._emergeTargetX = px;
                b.savedY = s.y;
                s.setAlpha(0.1); // appear to burrow (hide instead of going off-screen)
                b._emergePhase = 'burrow';
                break;
            }
            case 'acid_spit': {
                let count = 3 + Math.floor(Math.random() * 3);
                for (let i = 0; i < count; i++) {
                    let tx = px + (Math.random() - 0.5) * 200;
                    let angle = Math.atan2(GROUND_Y - s.y + BOSS_SIZE/2, tx - s.x);
                    this.spawnBossProjectile(s.x, s.y - BOSS_SIZE/2,
                        Math.cos(angle) * 250, Math.sin(angle) * 250 - 150,
                        'acid', 0x44ff44, { gravity: true });
                }
                break;
            }
            case 'tail_sweep': {
                // Shockwave from boss position across ground
                let dir = px < s.x ? -1 : 1;
                this.spawnBossProjectile(s.x, GROUND_Y + SPRITE_SIZE - 12, dir * 350, 0, 'shockwave', 0x886644);
                break;
            }
            case 'summon_grubs': {
                let count = 2 + Math.floor(Math.random() * 2);
                if (b.minionCount >= 4) break;
                for (let i = 0; i < count && b.minionCount < 4; i++) {
                    let mx = s.x + (Math.random() - 0.5) * 300;
                    let ed = this.spawnEnemy('bunny', mx, GROUND_Y + SPRITE_SIZE - 4, 1.8, false);
                    b.minionCount++;
                    ed._bossMinion = true;
                }
                break;
            }
        }
    }

    // --- Fire Drake ---
    executeFireDrakeAttack(name, b, s, px, py) {
        switch (name) {
            case 'fireball_spray': {
                let count = b.enraged ? 7 : 5;
                let baseAngle = Math.atan2(py - s.y, px - s.x);
                let spread = 0.25;
                for (let i = 0; i < count; i++) {
                    let angle = baseAngle + (i - (count-1)/2) * spread;
                    this.spawnBossProjectile(s.x, s.y - BOSS_SIZE/2, Math.cos(angle) * 320, Math.sin(angle) * 320, 'fireball', 0xff4400);
                }
                break;
            }
            case 'flame_breath': {
                b._breathDir = px < s.x ? -1 : 1;
                b._breathAngle = b._breathDir > 0 ? -0.5 : 0.5 + Math.PI;
                break;
            }
            case 'dive_fire_trail': {
                b._divePhase = 'down';
                b.savedY = s.y;
                break;
            }
            case 'wing_buffet': {
                let dir = px < s.x ? -1 : 1;
                this.player.setVelocityX(dir * 500);
                break;
            }
        }
    }

    // --- Ruin Knight ---
    executeRuinKnightAttack(name, b, s, px, py) {
        let dir = px < s.x ? -1 : 1;
        switch (name) {
            case 'sword_slash': {
                this.spawnBossProjectile(s.x, s.y - BOSS_SIZE/2, dir * 500, 0, 'shockwave', 0x88ccff);
                break;
            }
            case 'shield_charge': {
                b._chargeDir = dir;
                break;
            }
            case 'summon_wolves': {
                if (b.minionCount >= 3) break;
                for (let i = 0; i < 2 && b.minionCount < 3; i++) {
                    let mx = s.x + (Math.random() - 0.5) * 200;
                    let ed = this.spawnEnemy('fox', mx, GROUND_Y + SPRITE_SIZE - 4, 2.0, false);
                    b.minionCount++;
                    ed._bossMinion = true;
                }
                break;
            }
            case 'teleport_strike': {
                b._teleTarget = px;
                break;
            }
            case 'magic_orb': {
                let count = 6 + Math.floor(Math.random() * 5);
                for (let i = 0; i < count; i++) {
                    let angle = (Math.PI * 2 / count) * i;
                    this.spawnBossProjectile(s.x, s.y - BOSS_SIZE/2,
                        Math.cos(angle) * 150, Math.sin(angle) * 150,
                        'orb', 0xaa44ff);
                }
                break;
            }
            case 'spiral': {
                b._spiralAngle = 0;
                break;
            }
        }
    }

    // Active attack updates (per-frame during 'active' state)
    updateBossActiveAttack() {
        let b = this.boss;
        if (!b) return;
        let s = b.sprite;
        let name = b.currentAttackName;
        let frame = b.attackFrame;

        switch (b.type) {
            case 'bunny_king':
                if (name === 'spiral' && frame % 4 === 0) {
                    b._spiralAngle = (b._spiralAngle || 0) + 0.45;
                    let speed = b.enraged ? 280 : 220;
                    this.spawnBossProjectile(s.x, s.y - BOSS_SIZE/2,
                        Math.cos(b._spiralAngle) * speed, Math.sin(b._spiralAngle) * speed,
                        'carrot', 0xffaa00);
                    // Double spiral when enraged
                    if (b.enraged) {
                        this.spawnBossProjectile(s.x, s.y - BOSS_SIZE/2,
                            Math.cos(b._spiralAngle + Math.PI) * speed, Math.sin(b._spiralAngle + Math.PI) * speed,
                            'carrot', 0xff6600);
                    }
                }
                if (name === 'ground_pound') {
                    if (b._gpPhase === 'up' && frame < 20) {
                        s.y -= 5;
                    } else if (frame === 20) {
                        b._gpPhase = 'down';
                    }
                    if (b._gpPhase === 'down') {
                        s.y += 10;
                        if (s.y >= GROUND_Y + SPRITE_SIZE - 4) {
                            s.y = GROUND_Y + SPRITE_SIZE - 4;
                            // Shockwaves
                            this.spawnBossProjectile(s.x, GROUND_Y + SPRITE_SIZE - 12, -300, 0, 'shockwave', 0xffaa00);
                            this.spawnBossProjectile(s.x, GROUND_Y + SPRITE_SIZE - 12, 300, 0, 'shockwave', 0xffaa00);
                            b._gpPhase = 'done';
                        }
                    }
                }
                break;

            case 'golem':
                if (name === 'walk_slam') {
                    s.x += b._walkDir * b._walkSpeed * (1/60);
                    if (frame === b.activeFrames - 1) {
                        this.spawnBossProjectile(s.x, GROUND_Y + SPRITE_SIZE - 12, b._walkDir * 250, 0, 'shockwave', 0xaa8866);
                    }
                }
                if (name === 'charge') {
                    s.x += b._chargeDir * 480 * (1/60); // 8 * 60 = 480
                }
                break;

            case 'storm_crow':
                if (name === 'dive_bomb') {
                    if (b._divePhase === 'down') {
                        s.y += b._diveSpeed * (1/60);
                        if (s.y >= GROUND_Y + SPRITE_SIZE - 20) {
                            s.y = GROUND_Y + SPRITE_SIZE - 20;
                            b._divePhase = 'up';
                        }
                    } else {
                        s.y -= b._diveSpeed * 0.5 * (1/60);
                        if (s.y <= b.savedY) {
                            s.y = b.savedY;
                        }
                    }
                }
                if (name === 'wind_gust') {
                    this.player.x += b._windDir * b._windForce;
                }
                break;

            case 'cave_worm':
                if (name === 'emerge_snap') {
                    if (b._emergePhase === 'burrow') {
                        s.x += (b._emergeTargetX - s.x) * 0.1;
                        if (frame > 15) {
                            b._emergePhase = 'emerge';
                            s.setAlpha(1); // pop back into view at new position
                        }
                    } else if (b._emergePhase === 'emerge') {
                        s.y -= 16;
                        if (s.y <= b.savedY) {
                            s.y = b.savedY;
                            b._emergePhase = 'done';
                        }
                    }
                }
                break;

            case 'fire_drake':
                if (name === 'flame_breath') {
                    // Spawn fire particles along sweeping angle
                    if (frame % 3 === 0) {
                        b._breathAngle += b._breathDir * 0.02;
                        this.spawnBossProjectile(s.x, s.y - BOSS_SIZE/2,
                            Math.cos(b._breathAngle) * 400,
                            Math.sin(b._breathAngle) * 400,
                            'fireball', 0xff6600);
                    }
                }
                if (name === 'dive_fire_trail') {
                    if (b._divePhase === 'down') {
                        s.y += 6;
                        if (s.y >= GROUND_Y + SPRITE_SIZE - 20) {
                            s.y = GROUND_Y + SPRITE_SIZE - 20;
                            b._divePhase = 'trail';
                        }
                    } else if (b._divePhase === 'trail') {
                        let dir = this.player.x < s.x ? -1 : 1;
                        s.x += dir * 4;
                        // Leave fire trail
                        if (frame % 5 === 0) {
                            this.damageZones.push({
                                x: s.x - 15, y: GROUND_Y + SPRITE_SIZE - 10,
                                w: 30, h: 10,
                                life: 200,
