name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    if: |
      (github.event.sender.login == 'opieeipo' || github.event.sender.login == 'juegosdagoat-rgb' || github.event.sender.login == 'Lukeyboi-tech') &&
      (
        (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
        (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
        (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
        (github.event_name == 'issues' && contains(github.event.issue.body, '@claude'))
      )
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
    env:
      DAILY_LIMIT: 10  # max @claude triggers per day across all users
    steps:
      - name: Check daily rate limit
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TODAY=$(date -u +%Y-%m-%dT00:00:00Z)
          COUNT=$(gh api \
            "repos/${{ github.repository }}/actions/workflows/claude.yml/runs?created=>=$TODAY&status=completed" \
            --jq '.total_count')
          echo "Claude runs today: $COUNT / $DAILY_LIMIT"
          if [ "$COUNT" -ge "$DAILY_LIMIT" ]; then
            echo "::error::Daily limit of $DAILY_LIMIT @claude runs reached. Try again tomorrow."
            exit 1
          fi

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
